<!DOCTYPE html>

<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POPs HNR — Leitura e Avaliação</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="./assets/fonts.css" rel="stylesheet">
<style>
  :root{
    --bg:#f5f8fc; --surface:#fff; --surface-2:#eaf1f9;
    --ink:#1b2733; --muted:#5a6b7b; --faint:#90a3b3;
    --primary:#0a4da2; --primary-dark:#063a7a; --primary-soft:#eaf1f9;
    --line:#dde7f1; --line-strong:#c5d6e8;
    --accent:#d3202a; --accent-soft:#fdeaeb;
    --success:#1a8f54; --success-soft:#e4f4ea;
    --warn:#c97a00; --warn-soft:#fbefd9;
    --danger:#d3202a; --danger-soft:#fdeaeb;
    --pending:#90a3b3; --pending-soft:#eef3f7;
    --gold:#b98a1d; --gold-soft:#fdf6e3;
    --shadow:0 1px 2px rgba(10,77,162,.06),0 8px 24px rgba(10,77,162,.10);
    --radius:16px;
  }
  [data-theme="dark"]{
    --bg:#0e1622; --surface:#16202e; --surface-2:#1c2939;
    --ink:#e8eef5; --muted:#9db0c3; --faint:#64798e;
    --primary:#4d8fe0; --primary-dark:#7db2f0; --primary-soft:#1d3a5c;
    --line:#243447; --line-strong:#33485f;
    --accent:#f0606a; --accent-soft:#3a1d22;
    --success:#46c082; --success-soft:#15301f;
    --warn:#e0a23e; --warn-soft:#332714;
    --danger:#f0606a; --danger-soft:#3a1d22;
    --pending:#64798e; --pending-soft:#1c2939;
    --gold:#e3b54a; --gold-soft:#2e2611;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;
    transition:background .25s,color .25s;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3,h4{margin:0;letter-spacing:-.01em}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes popIn{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}50%{transform:translateX(-4px)}}
  @keyframes drawCheck{to{stroke-dashoffset:0}}
  .fade-up{animation:fadeUp .3s ease both}
  .shake{animation:shake .5s ease}

  /* ---- top bar ---- */
  .topbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--line)}
  .topbar::before{content:"";display:block;height:3px;
    background:linear-gradient(90deg,var(--primary) 0 50%,var(--accent) 50% 100%)}
  .topbar-inner{max-width:1080px;margin:0 auto;padding:12px 20px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;margin-right:auto}
  .brand .logo-chip{width:46px;height:46px;border-radius:12px;background:#fff;flex:none;
    border:1px solid var(--line);box-shadow:var(--shadow);padding:4px;display:grid;place-items:center}
  .brand .logo-chip img{width:100%;height:100%;object-fit:contain}
  .logo-chip.logo-fail img{display:none}
  .logo-chip.logo-fail::after{content:"HNR";font-weight:900;font-size:13px;color:var(--primary);letter-spacing:.02em}
  .brand b{font-size:15px;font-weight:800;display:block;line-height:1.15;color:var(--primary-dark)}
  .brand span{font-size:12px;color:var(--muted)}
  #topbar-right{display:flex;align-items:center;gap:12px}
  .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
    background:var(--surface);display:grid;place-items:center;font-size:16px;transition:.15s}
  .theme-btn:hover{border-color:var(--primary)}
  .who2{display:flex;align-items:center;gap:9px}
  .who2 .nm b{font-weight:600;color:var(--ink);display:block;font-size:13px;line-height:1.2}
  .who2 .nm small{color:var(--muted);font-size:11.5px}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);
    color:var(--primary);display:grid;place-items:center;font-weight:700;font-size:12px;flex:none}
  .logout{border:1px solid var(--line);background:var(--surface);border-radius:9px;
    padding:8px 13px;font-size:13px;font-weight:600;color:var(--muted);transition:.15s}
  .logout:hover{border-color:var(--accent);color:var(--accent)}

  /* ---- layout ---- */
  main{max-width:1080px;margin:0 auto;padding:26px 20px 80px}
  .pagehead{margin-bottom:20px}
  .pagehead h2{font-size:22px}
  .pagehead p{margin:4px 0 0;color:var(--muted);font-size:14px}
  .proto-note{display:inline-flex;align-items:center;gap:6px;font-size:11px;
    color:var(--warn);background:var(--warn-soft);border-radius:20px;
    padding:3px 10px;font-weight:600;margin-top:10px}
  .gestor-head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}
  .btn-report{flex:none;border:0;border-radius:11px;font-weight:700;font-size:13.5px;
    letter-spacing:.01em;padding:11px 20px;cursor:pointer;color:#fff;white-space:nowrap;
    display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    box-shadow:0 2px 4px rgba(10,77,162,.26),0 7px 18px rgba(10,77,162,.22),
      inset 0 1px 0 rgba(255,255,255,.22);
    transition:transform .16s ease,box-shadow .16s ease,filter .16s ease}
  [data-theme="dark"] .btn-report{color:#0e1622}
  .btn-report svg{width:16px;height:16px;flex:none}
  .btn-report:hover{transform:translateY(-1px);filter:brightness(1.06);
    box-shadow:0 4px 7px rgba(10,77,162,.30),0 12px 24px rgba(10,77,162,.28),
      inset 0 1px 0 rgba(255,255,255,.26)}
  .btn-report:active{transform:translateY(0);
    box-shadow:0 1px 3px rgba(10,77,162,.32),inset 0 1px 2px rgba(0,0,0,.14)}
  .report-actions{display:flex;gap:10px;flex-wrap:wrap}
  .matrix th.selcol,.matrix td.selcol{width:34px;text-align:center;padding-left:6px;padding-right:6px}
  .matrix .sel-colab,.matrix .selcol input{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
  .btn-report:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

  /* ---- progress summary ---- */
  .mybar{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;box-shadow:var(--shadow);margin-bottom:22px;
    display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .mybar .ring{--p:0;width:64px;height:64px;border-radius:50%;flex:none;
    background:conic-gradient(var(--primary) calc(var(--p)*1%),var(--line) 0);
    display:grid;place-items:center}
  .mybar .ring i{width:48px;height:48px;background:var(--surface);border-radius:50%;
    display:grid;place-items:center;font-style:normal;font-weight:700;font-size:14px}
  .mybar .txt b{font-size:15px}
  .mybar .txt p{margin:2px 0 0;color:var(--muted);font-size:13px}

  /* ---- certificate banner ---- */
  .cert-banner{background:linear-gradient(120deg,var(--gold-soft),var(--surface));
    border:1px solid var(--gold);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px 20px;margin-bottom:22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    animation:fadeUp .4s ease both}
  .cert-banner .medal{width:48px;height:48px;border-radius:50%;background:var(--gold);
    color:#fff;display:grid;place-items:center;font-size:22px;flex:none}
  .cert-banner .tx{flex:1;min-width:200px}
  .cert-banner b{font-size:15px}
  .cert-banner p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .btn-gold{position:relative;border:0;border-radius:11px;font-weight:700;font-size:13.5px;
    letter-spacing:.01em;padding:11px 20px;cursor:pointer;color:#fff;white-space:nowrap;
    display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,#d8a830,#b98a1d 52%,#9a6f12);
    box-shadow:0 2px 4px rgba(140,103,20,.28),0 7px 18px rgba(140,103,20,.24),
      inset 0 1px 0 rgba(255,255,255,.30);
    transition:transform .16s ease,box-shadow .16s ease,filter .16s ease}
  .btn-gold svg{width:16px;height:16px;flex:none}
  .btn-gold:hover{transform:translateY(-1px);filter:brightness(1.05);
    box-shadow:0 4px 7px rgba(140,103,20,.30),0 12px 24px rgba(140,103,20,.30),
      inset 0 1px 0 rgba(255,255,255,.34)}
  .btn-gold:active{transform:translateY(0);
    box-shadow:0 1px 3px rgba(140,103,20,.32),inset 0 1px 2px rgba(0,0,0,.14)}
  .btn-gold:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* ---- pop cards ---- */
  .grid{display:grid;gap:14px}
  .popcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;box-shadow:var(--shadow);display:flex;gap:16px;align-items:center;
    transition:border-color .15s,transform .15s;animation:fadeUp .3s ease both}
  .popcard:hover{border-color:var(--line-strong);transform:translateY(-1px)}
  .popcard .code{font-size:12px;font-weight:700;color:var(--primary);
    background:var(--primary-soft);border-radius:7px;padding:4px 9px;flex:none}
  .popcard .meta{flex:1;min-width:0}
  .popcard h3{font-size:16px;line-height:1.3}
  .popcard .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
  .seal{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
    color:var(--gold);margin-top:5px}
  .badge{font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .badge.pending{color:var(--pending);background:var(--pending-soft)}
  .badge.read{color:var(--warn);background:var(--warn-soft)}
  .badge.pass{color:var(--success);background:var(--success-soft)}
  .badge.fail{color:var(--danger);background:var(--danger-soft)}
  .badge.locked{color:var(--faint);background:var(--pending-soft)}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  /* buscador de POPs */
  .popsearch{margin:6px 0 18px}
  .popsearch .sb{position:relative;display:flex;align-items:center}
  .popsearch .sb svg{position:absolute;left:14px;width:18px;height:18px;color:var(--faint);pointer-events:none}
  .popsearch input{width:100%;font-family:inherit;font-size:14.5px;padding:12px 40px 12px 42px;
    border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink);
    transition:border-color .15s,box-shadow .15s}
  .popsearch input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .popsearch .clr{position:absolute;right:8px;border:0;background:transparent;color:var(--muted);
    font-size:18px;cursor:pointer;padding:6px 9px;border-radius:8px;line-height:1}
  .popsearch .clr:hover{background:var(--surface-2)}
  .popsearch.locked input{cursor:not-allowed;background:var(--surface-2);color:var(--faint)}
  .popsearch.locked .sb svg{color:var(--faint)}
  .popsearch .hint{margin-top:7px;font-size:12.5px;color:var(--faint)}
  .res-head{font-size:13px;color:var(--muted);font-weight:600;margin:4px 0 10px}
  .res-head b{color:var(--ink)}
  .pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .pill{font-size:11px;font-weight:600;color:var(--primary);background:var(--primary-soft);
    padding:2px 8px;border-radius:20px}
  .pill.mine{color:var(--success);background:var(--success-soft)}
  .hi{background:var(--warn-soft);color:var(--warn);border-radius:3px;padding:0 2px;font-weight:700}
  /* etapas */
  .etapa-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    margin:22px 0 10px;flex-wrap:wrap}
  .etapa-head h2,.etapa-head h3{font-size:15px;font-weight:700}
  .etapa-prog{font-size:12.5px;color:var(--muted)}
  .etapa-prog.ok{color:var(--success);font-weight:700}
  .etapa-lock{font-size:12.5px;color:var(--faint);font-weight:600}
  .etapa-sub{margin:2px 0 10px;color:var(--muted);font-size:13px}
  .etapa-bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin:0 0 14px}
  .etapa-bar i{display:block;height:100%;background:var(--success);border-radius:99px;transition:width .4s ease}
  .popcard.is-locked{opacity:.62}
  .popcard.is-locked:hover{transform:none;border-color:var(--line)}
  .btn{border:0;border-radius:9px;font-weight:600;font-size:13.5px;padding:9px 16px;
    background:var(--primary);color:#fff;transition:.15s}
  .btn:hover{background:var(--primary-dark)}
  .btn:disabled{background:var(--pending-soft);color:var(--faint);cursor:not-allowed}
  [data-theme="dark"] .btn{color:#0e1622}
  .btn.ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--line)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.block{width:100%;padding:13px;font-size:15px}

  /* ---- reading top ---- */
  .readtop{position:sticky;top:66px;z-index:40;background:var(--bg);margin:-26px -20px 0;padding:14px 20px 12px}
  .readtop .row{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .readtop .back{border:1px solid var(--line);background:var(--surface);border-radius:8px;
    padding:7px 12px;font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px}
  .readtop .label{font-size:12.5px;color:var(--muted);font-weight:600;white-space:nowrap}
  .readbar{height:6px;background:var(--line);border-radius:20px;flex:1;overflow:hidden}
  .readbar i{display:block;height:100%;width:0;background:var(--primary);border-radius:20px;transition:width .12s}

  /* ---- article + carimbo institucional ---- */
  .article{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;margin-top:16px;animation:fadeUp .3s ease both}
  .stamp{border-bottom:1px solid var(--line);background:var(--surface-2);padding:20px 24px}
  .stamp-grid{border:1.5px solid var(--line-strong);border-radius:10px;overflow:hidden;
    display:grid;grid-template-columns:88px 1fr 170px;background:var(--surface)}
  .stamp-grid>div{padding:12px 14px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    display:flex;flex-direction:column;justify-content:center}
  .stamp-logo{grid-row:1/3;align-items:center}
  .stamp-logo img{width:58px;height:58px;object-fit:contain}
  .stamp-logo small{font-size:8.5px;font-weight:700;color:var(--muted);text-align:center;margin-top:5px;letter-spacing:.03em}
  .stamp-title small{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
  .stamp-title h2{font-size:17px;margin-top:3px;color:var(--primary-dark)}
  .stamp-meta{gap:3px}
  .stamp-meta div{font-size:11.5px;color:var(--muted)}
  .stamp-meta b{color:var(--ink);font-weight:700}
  .stamp-code{font-size:13px;font-weight:800;color:var(--primary)}
  .stamp-row{grid-column:1/4;flex-direction:row !important;gap:26px;border-bottom:0 !important;flex-wrap:wrap}
  .stamp-row span{font-size:11.5px;color:var(--muted)}
  .stamp-row b{color:var(--ink)}
  .stamp-grid>div:nth-child(3),.stamp-grid>div:nth-child(5){border-right:0}

  .article .body{padding:26px 28px;max-width:78ch;margin:0 auto}
  .sec{margin-bottom:34px}
  .sec:last-child{margin-bottom:0}
  .sec h3{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--primary);
    display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .sec h3 .n{width:23px;height:23px;border-radius:6px;background:var(--primary-soft);
    color:var(--primary);display:grid;place-items:center;font-size:12px;flex:none}
  .sec p{margin:0 0 12px;font-size:16px;line-height:1.65;color:var(--ink)}
  .sec p,.sec li{opacity:.92}
  .sec ul{margin:0;padding-left:0;list-style:none}
  .sec li{font-size:16px;line-height:1.6;padding:6px 0 6px 24px;position:relative}
  .sec li::before{content:"";position:absolute;left:4px;top:15px;width:6px;height:6px;
    border-radius:2px;background:var(--primary)}
  .sec li b{font-weight:700;opacity:1}
  .alert{background:var(--warn-soft);border-left:3px solid var(--warn);border-radius:8px;
    padding:13px 16px;font-size:15px;line-height:1.55;margin-top:10px}
  .ptable{width:100%;border-collapse:collapse;margin:8px 0 4px;font-size:14.5px;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden}
  .ptable th{background:var(--primary-soft);color:var(--primary-dark);font-size:12px;
    text-transform:uppercase;letter-spacing:.04em;padding:9px 13px;text-align:left}
  [data-theme="dark"] .ptable th{color:var(--primary)}
  .ptable td{padding:9px 13px;border-top:1px solid var(--line)}
  .ptable tr:nth-child(even) td{background:var(--surface-2)}
  .ptable tr.hl td{background:var(--success-soft);font-weight:600}
  .ptable td:first-child{font-weight:600}
  .endmark{text-align:center;padding:18px;color:var(--faint);font-size:13px;
    border-top:1px dashed var(--line-strong);margin-top:14px}

  .quizgate{margin-top:18px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;text-align:center;animation:fadeUp .3s ease both}
  .quizgate h3{font-size:17px}
  .quizgate p{color:var(--muted);font-size:14px;margin:6px 0 16px}
  .quizgate .lock{font-size:13px;color:var(--warn);font-weight:600;margin-bottom:14px;
    display:flex;align-items:center;justify-content:center;gap:7px}
  .rules{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
  .rule{font-size:12px;font-weight:600;color:var(--muted);background:var(--surface-2);
    border:1px solid var(--line);border-radius:20px;padding:5px 12px;display:inline-flex;gap:6px;align-items:center}

  /* ---- quiz stepper ---- */
  .quiz{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;margin-top:16px;animation:fadeUp .25s ease both}
  .quiz-head{padding:20px 26px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .quiz-head .info{flex:1;min-width:180px}
  .quiz-head h2{font-size:17px}
  .quiz-head p{color:var(--muted);font-size:13px;margin:3px 0 0}
  .steps{display:flex;gap:6px}
  .step{width:26px;height:6px;border-radius:4px;background:var(--line)}
  .step.cur{background:var(--primary)}
  .step.done{background:var(--success)}
  .timer{position:relative;width:54px;height:54px;flex:none}
  .timer svg{transform:rotate(-90deg)}
  .timer circle{fill:none;stroke-width:5}
  .timer .tk{stroke:var(--line)}
  .timer .tv{stroke:var(--primary);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s}
  .timer.warn .tv{stroke:var(--warn)}
  .timer.crit .tv{stroke:var(--danger)}
  .timer b{position:absolute;inset:0;display:grid;place-items:center;font-size:14px}
  .timer.crit b{color:var(--danger)}
  .question{padding:24px 26px}
  .question .qn{font-size:12px;font-weight:700;color:var(--primary)}
  .question .qt{font-size:16.5px;font-weight:600;margin:8px 0 18px;line-height:1.5}
  .opt{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:9px;cursor:pointer;font-size:15px;transition:.12s;line-height:1.45}
  .opt:hover{border-color:var(--primary);background:var(--surface-2)}
  .opt input{margin-top:3px;accent-color:var(--primary)}
  .opt.sel{border-color:var(--primary);background:var(--primary-soft)}
  .opt.correct{border-color:var(--success);background:var(--success-soft)}
  .opt.wrong{border-color:var(--danger);background:var(--danger-soft)}
  .quiz-foot{padding:18px 26px;border-top:1px solid var(--line);display:flex;justify-content:flex-end}

  /* ---- result ---- */
  .result{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:34px 28px;text-align:center;animation:fadeUp .3s ease both}
  .result .score{--p:0;width:124px;height:124px;border-radius:50%;margin:0 auto 18px;
    background:conic-gradient(var(--rc) calc(var(--p)*1%),var(--line) 0);display:grid;place-items:center;
    animation:popIn .5s cubic-bezier(.2,.9,.3,1.4) both}
  .result .score i{width:98px;height:98px;background:var(--surface);border-radius:50%;
    display:grid;place-items:center;font-style:normal}
  .result .score b{font-size:26px;line-height:1.1;display:block}
  .result .score em{font-style:normal;font-size:11px;color:var(--muted)}
  .checkmark{width:64px;height:64px;margin:0 auto 14px;display:block}
  .checkmark circle{fill:var(--success-soft);stroke:var(--success);stroke-width:2}
  .checkmark path{fill:none;stroke:var(--success);stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:34;stroke-dashoffset:34;animation:drawCheck .5s .25s ease forwards}
  .result h2{font-size:22px}
  .result .verdict{font-size:14px;color:var(--muted);margin:8px auto 22px;max-width:400px}
  .result .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  /* ---- certificado ---- */
  .cert{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:8px;margin-top:16px;animation:fadeUp .3s ease both}
  .cert-inner{border:2.5px solid var(--primary);border-radius:12px;padding:6px}
  .cert-inner2{border:1px solid var(--gold);border-radius:9px;padding:42px 38px;text-align:center;position:relative}
  .cert-inner2 .logo-chip{width:62px;height:62px;border-radius:14px;background:#fff;
    border:1px solid var(--line);margin:0 auto 16px;padding:6px;display:grid;place-items:center}
  .cert-inner2 .logo-chip img{width:100%;height:100%;object-fit:contain}
  .cert-eyebrow{font-size:11px;font-weight:800;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
  .cert-inner2 h2{font-size:26px;color:var(--primary-dark);margin:8px 0 22px}
  .cert-inner2 .conf{font-size:14px;color:var(--muted)}
  .cert-name{font-size:28px;font-weight:800;color:var(--ink);margin:10px 0 2px}
  .cert-role{font-size:13.5px;color:var(--muted);margin-bottom:22px}
  .cert-body{font-size:14px;color:var(--muted);max-width:520px;margin:0 auto 24px;line-height:1.7}
  .cert-pops{display:grid;gap:6px;max-width:520px;margin:0 auto 26px;text-align:left}
  .cert-pop{display:flex;align-items:center;gap:10px;font-size:13px;background:var(--surface-2);
    border:1px solid var(--line);border-radius:8px;padding:8px 13px}
  .cert-pop .ck{color:var(--success);font-weight:800}
  .cert-pop b{flex:1}
  .cert-pop span{color:var(--muted);font-size:12px}
  .cert-foot{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;
    max-width:560px;margin:0 auto;padding-top:10px}
  .cert-sign{flex:1;text-align:center}
  .cert-sign .ln{border-top:1.5px solid var(--ink);margin-bottom:6px;opacity:.6}
  .cert-sign b{font-size:12.5px;display:block}
  .cert-sign small{font-size:11px;color:var(--muted)}
  .cert-date{font-size:12.5px;color:var(--muted)}
  .cert-actions{display:flex;gap:10px;justify-content:center;margin-top:18px}
  /* certificado final (2º) — visual dourado diferenciado */
  .cert.final .cert-inner{border-color:var(--gold)}
  .cert.final .cert-inner2{border-color:var(--gold);
    background:linear-gradient(160deg,var(--gold-soft),var(--surface) 60%)}
  .cert.final .cert-eyebrow{color:var(--primary)}
  .cert.final .cert-inner2 h2{color:#8a6a12}
  .cert.final .cert-name{color:#7a5d10}
  .cert-seal{position:absolute;top:16px;right:16px;width:78px;height:78px;border-radius:50%;
    background:radial-gradient(circle at 32% 28%,#f8df8c,var(--gold));color:#5b4708;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 4px 12px rgba(176,138,20,.4);transform:rotate(8deg)}
  .cert-seal b{font-size:24px;line-height:1}
  .cert-seal span{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;text-align:center;margin-top:2px;line-height:1.15}
  /* modal de pré-visualização do modelo de certificado (gestor) */
  .cert-modal{position:fixed;inset:0;z-index:60;display:none;background:rgba(8,18,33,.62);
    padding:26px 14px;overflow:auto}
  .cert-modal.open{display:flex;align-items:flex-start;justify-content:center}
  .cm-card{background:var(--surface);border-radius:14px;max-width:780px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .cm-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line)}
  .cm-head b{flex:1;font-size:14.5px}
  .cm-note{font-size:11.5px;color:var(--muted)}
  .cm-close{border:0;background:var(--surface-2);color:var(--ink);border-radius:8px;
    padding:7px 13px;font-weight:600;cursor:pointer}
  .cm-close:hover{background:var(--line)}
  .cm-body{padding:18px}
  .cm-body .cert.cert-preview{box-shadow:none;padding:0}
  .kpi-link{cursor:pointer;transition:transform .15s,border-color .15s}
  .kpi-link:hover{border-color:var(--gold);transform:translateY(-1px)}
  .kpi .see{display:block;font-size:10px;color:var(--primary);font-weight:600;margin-top:3px}

  /* ---- gestor ---- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;box-shadow:var(--shadow);animation:fadeUp .3s ease both}
  .kpi .v{font-size:26px;font-weight:700;line-height:1}
  .kpi .l{font-size:12.5px;color:var(--muted);margin-top:5px}
  .kpi .v.green{color:var(--success)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;margin-bottom:22px;animation:fadeUp .3s ease both}
  .panel-head{padding:16px 22px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between}
  .panel-head h3{font-size:15px}
  .panel-head span{font-size:12.5px;color:var(--muted)}
  .matrix{width:100%;border-collapse:collapse;font-size:13px}
  .matrix th,.matrix td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line)}
  .matrix thead th{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;
    color:var(--muted);font-weight:600;background:var(--surface-2)}
  .matrix tbody tr:last-child td{border-bottom:0}
  .matrix .person{display:flex;align-items:center;gap:10px}
  .matrix .person b{font-weight:600;font-size:13.5px}
  .matrix .person small{color:var(--faint);font-size:11.5px;display:block}
  .cell{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:12.5px}
  .cell.pass{color:var(--success)} .cell.fail{color:var(--danger)}
  .cell.read{color:var(--warn)} .cell.pending{color:var(--faint)}
  .cell.na{color:var(--faint);opacity:.55;font-weight:500}
  .cell .ic{width:9px;height:9px;border-radius:50%;background:currentColor;flex:none}
  .cellbtn{border:0;background:transparent;padding:4px 6px;margin:-4px -6px;border-radius:8px;
    display:inline-flex;align-items:center;gap:7px;transition:.12s}
  .cellbtn:hover{background:var(--surface-2);outline:1px solid var(--line-strong)}
  .cellbtn .eye{font-size:12px;opacity:.45}
  .cellbtn:hover .eye{opacity:1}
  .pbar{height:7px;background:var(--line);border-radius:20px;overflow:hidden;min-width:90px}
  .pbar i{display:block;height:100%;background:var(--primary);border-radius:20px}
  .pcompact{display:flex;align-items:center;gap:10px}
  .pcompact b{font-size:13px;width:38px;text-align:right}
  .perpop-row{display:flex;align-items:center;gap:14px;padding:11px 22px;border-bottom:1px solid var(--line)}
  .perpop-row:last-child{border-bottom:0}
  .perpop-row .nm{flex:1;min-width:0}
  .perpop-row .nm b{font-size:13.5px;font-weight:600}
  .perpop-row .nm small{display:block;color:var(--faint);font-size:11.5px}
  .perpop-row .code{font-size:12px;font-weight:700;color:var(--primary);
    background:var(--primary-soft);border-radius:7px;padding:4px 9px;flex:none}

  /* ---- empty state ---- */
  .empty{padding:36px 20px;text-align:center;color:var(--muted)}
  .empty .ic{font-size:30px;margin-bottom:8px}
  .empty b{display:block;color:var(--ink);font-size:14.5px;margin-bottom:3px}
  .empty p{font-size:13px;margin:0}

  /* ---- auth ---- */
  .auth-wrap{min-height:calc(100vh - 120px);display:grid;place-items:center;padding:28px 16px}
  .auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:30px 28px;animation:fadeUp .3s ease both}
  .auth-head{text-align:center;margin-bottom:22px}
  .auth-head .logo-chip{width:56px;height:56px;border-radius:13px;background:#fff;
    border:1px solid var(--line);box-shadow:var(--shadow);padding:5px;display:grid;place-items:center;margin:0 auto 14px}
  .auth-head .logo-chip img{width:100%;height:100%;object-fit:contain}
  .auth-head h2{font-size:20px}
  .auth-head p{color:var(--muted);font-size:13.5px;margin-top:5px}
  .auth-choice{display:grid;gap:12px}
  .choice-btn{display:flex;align-items:center;gap:14px;text-align:left;width:100%;
    border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:16px 18px;transition:.15s;color:var(--ink)}
  .choice-btn:hover{border-color:var(--primary);background:var(--surface-2);transform:translateY(-1px)}
  .choice-btn .ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:none}
  .choice-btn .ic svg{width:21px;height:21px}
  .ic-blue{background:var(--primary-soft);color:var(--primary)}
  .ic-red{background:var(--accent-soft);color:var(--accent)}
  .choice-btn b{font-size:15px;display:block}
  .choice-btn small{color:var(--muted);font-size:12.5px}
  .choice-btn .chev{margin-left:auto;color:var(--faint);font-size:18px}
  .auth-tabs{display:flex;background:var(--surface-2);border:1px solid var(--line);
    border-radius:10px;padding:3px;margin-bottom:20px}
  .auth-tabs button{flex:1;border:0;background:transparent;color:var(--muted);
    font-weight:600;font-size:13.5px;padding:9px;border-radius:7px}
  .auth-tabs button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(10,77,162,.12)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input,.field select{width:100%;font-family:inherit;font-size:14.5px;padding:11px 13px;
    border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--primary);
    box-shadow:0 0 0 3px var(--primary-soft)}
  .auth-err{display:none;background:var(--danger-soft);color:var(--danger);border-radius:9px;
    padding:10px 13px;font-size:13px;margin-bottom:14px;font-weight:500}
  .auth-back{background:transparent;border:0;color:var(--muted);font-size:13px;font-weight:600;
    margin-top:14px;padding:8px;width:100%}
  .auth-back:hover{color:var(--ink)}
  .hint{margin-top:18px;background:var(--surface-2);border:1px dashed var(--line-strong);
    border-radius:10px;padding:11px 13px;font-size:12px;color:var(--muted);text-align:center}
  .hint b{color:var(--ink)}

  @media(max-width:640px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .topbar-inner{padding:10px 14px}
    main{padding:18px 14px 70px}
    .brand span{display:none}
    .popcard{flex-wrap:wrap}
    .popcard .badge{order:3}
    .article .body{padding-left:18px;padding-right:18px}
    .stamp{padding:14px}
    .stamp-grid{grid-template-columns:64px 1fr}
    .stamp-grid>div:nth-child(3){grid-column:1/3;border-right:0;flex-direction:row;gap:14px}
    .stamp-logo img{width:44px;height:44px}
    .stamp-row{grid-column:1/3}
    .matrix .hidesm{display:none}
    .cert-inner2{padding:28px 16px}
    .cert-name{font-size:22px}
  }

  @media print{
    body{background:#fff}
    .topbar,.no-print,.proto-note{display:none !important}
    main{padding:0;max-width:none}
    .cert{box-shadow:none;padding:0;margin:0}
    .cert-actions{display:none}
  }
</style>
</head>

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const pop = id => db.pops.find(p=>p.id===id);
const initials = n => n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

/* ---------- setores ---------- */
const SETOR_LABELS = {assistencial:'Assistencial', uti:'UTI', cc:'Centro Cirúrgico', ambulatorio:'Ambulatório / Hospital Dia', cme:'CME'};
const setorLabel = s => SETOR_LABELS[s] || s || '—';
// POPs disponíveis para um setor. Setor desconhecido/vazio → todos (fallback p/ dados legados).
function popsDoSetor(setor){
  if(!setor || !SETOR_LABELS[setor]) return db.pops;
  return db.pops.filter(p => Array.isArray(p.setores) && p.setores.includes(setor));
}
function meusPops(){ return popsDoSetor(session && session.setor); }
// ordenação alfabética (pt-BR) — colaboradores por nome, POPs por código
const byNome = (a,b) => (a.nome||'').localeCompare(b.nome||'', 'pt-BR', {sensitivity:'base'});
const byCode = (a,b) => (a.code||'').localeCompare(b.code||'', 'pt-BR', {numeric:true});

/* ---------- etapas / 2 certificados ----------
   Trilha do colaborador = POPs do seu setor, divididos por etapa (campo p.etapa).
   Etapa 1 → 1º certificado. Etapa 2 (questões só de alta dificuldade) fica
   bloqueada até concluir a Etapa 1; ao concluí-la, libera o certificado final. */
const ETAPA_LABEL = {1:'Etapa 1 · Fundamentos', 2:'Etapa 2 · Avançado'};
const popEtapa = p => (p && p.etapa===2) ? 2 : 1;
function popsEtapa(setor, e){ return popsDoSetor(setor).filter(p => popEtapa(p)===e).sort(byCode); }
// Meta de conclusão da etapa. Etapa 1 → ler e responder ao menos ETAPA1_MIN (15)
// POPs da área (ou todos, se o setor tiver menos de 15). Etapa 2 → todos os POPs da etapa.
function metaEtapa(setor, e){ const n=popsEtapa(setor,e).length; return e===1 ? Math.min(ETAPA1_MIN, n) : n; }
function aprovadosEtapaSet(setor, e, aprovSet){ return popsEtapa(setor,e).filter(p=>aprovSet.has(p.id)).length; }
function aprovadosEtapa(e){ return popsEtapa(session && session.setor, e).filter(p=>POPCore.isLocked(p.id, aprovadosServidor)).length; }
function etapaDoneSet(setor, e, aprovSet){ const meta=metaEtapa(setor,e); return meta>0 && aprovadosEtapaSet(setor,e,aprovSet) >= meta; }
function etapaDone(e){ const meta=metaEtapa(session && session.setor, e); return meta>0 && aprovadosEtapa(e) >= meta; }
function etapa2Unlocked(){ return etapaDone(1); }
function temEtapa2(){ return popsEtapa(session && session.setor, 2).length>0; }

function statusOf(pid){
  if(POPCore.isLocked(pid, aprovadosServidor)){
    const m=meuProgresso[pid]||{};
    return {k:'pass', label:'Aprovado', locked:true, hits:m.hits, score:m.score, date:m.date};
  }
  const p=pop(pid);
  if(p && popEtapa(p)===2 && !etapa2Unlocked()) return {k:'locked', label:'Bloqueado'};
  const m=meuProgresso[pid];
  if(m && m.status==='reprovado') return {k:'fail', label:'Refazer', hits:m.hits, score:m.score, date:m.date};
  return {k:'pending', label:'Pendente'};
}
function userProgress(){
  const mine=meusPops();
  const total=mine.length;
  const done=mine.filter(p=>POPCore.isLocked(p.id, aprovadosServidor)).length;
  return {done,total,pct: total?Math.round(done/total*100):0};
}

/* ---------- buscador de POPs (consulta) ---------- */
const normTxt = s => (s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
function popIndex(p){
  if(p._idx) return p._idx;
  const secs = (p.sections||[]).map(s =>
    (s.h||'')+' '+(s.sub||'')+' '+(s.note||'')+' '+((s.items||[]).join(' '))
  ).join(' ');
  p._idx = normTxt([p.code,p.title,p.executantes,p.origem,secs].join(' '));
  return p._idx;
}
function searchPops(q){
  const nq = normTxt(q).trim();
  if(nq.length < 2) return [];
  const mineSet = new Set(meusPops().map(p=>p.id));
  return db.pops
    .map(p=>{
      const nt = normTxt(p.title), nc = normTxt(p.code);
      let rank;
      if(nt.includes(nq)) rank=0;
      else if(nc.includes(nq)) rank=1;
      else if(popIndex(p).includes(nq)) rank=2;
      else return null;
      return {p, rank, mine:mineSet.has(p.id)};
    })
    .filter(Boolean)
    .sort((a,b)=> a.rank-b.rank || byCode(a.p,b.p));
}
function highlight(text, q){
  const nq = normTxt(q).trim();
  if(nq.length<2) return text;
  const nt = normTxt(text);
  const i = nt.indexOf(nq);
  if(i<0) return text;
  return text.slice(0,i)+'<span class="hi">'+text.slice(i,i+q.trim().length)+'</span>'+text.slice(i+q.trim().length);
}
function consultarPop(id){
  if(!buscadorLiberado()){ alert('A consulta livre de POPs é liberada após concluir os 2 certificados.'); return; }
  clearQuizTimer(); activePop=id; consulta=true; screen='reader'; render(); window.scrollTo(0,0);
}

/* ---------- quiz engine (sorteio + cronômetro) ---------- */
function startQuiz(){
  const p=pop(activePop);
  if(POPCore.isLocked(activePop, aprovadosServidor)){ alert('Você já foi aprovado neste POP. Não é possível refazer.'); return; }
  if(popEtapa(p)===2 && !etapa2Unlocked()){ alert('Conclua a Etapa 1 para desbloquear a Etapa 2.'); return; }
  const drawn=POPCore.drawQuiz(p.pool, QUIZ_SIZE, popEtapa(p)===2 ? 3 : 2);
  quizState={list:drawn,cur:0,answers:Array(QUIZ_SIZE).fill(null),tLeft:QTIME,timerId:null};
  screen='quiz'; render(); window.scrollTo(0,0);
  startTimer();
}
function clearQuizTimer(){ if(quizState&&quizState.timerId){clearInterval(quizState.timerId);quizState.timerId=null;} }
function startTimer(){
  clearQuizTimer();
  quizState.tLeft=QTIME;
  updateTimerUI();
  quizState.timerId=setInterval(()=>{
    quizState.tLeft--;
    if(quizState.tLeft<=0){ nextQuestion(true); return; }
    updateTimerUI();
  },1000);
}
function updateTimerUI(){
  const t=$('#timer'); if(!t||!quizState) return;
  const tv=t.querySelector('.tv'), b=t.querySelector('b');
  const C=2*Math.PI*24;
  tv.style.strokeDasharray=C;
  tv.style.strokeDashoffset=C*(1-quizState.tLeft/QTIME);
  b.textContent=quizState.tLeft;
  t.classList.toggle('warn',quizState.tLeft<=15&&quizState.tLeft>6);
  t.classList.toggle('crit',quizState.tLeft<=6);
}
function pickOpt(j){
  if(!quizState) return;
  quizState.answers[quizState.cur]=j;
  document.querySelectorAll('.opt').forEach((el,k)=>el.classList.toggle('sel',k===j));
  const b=$('#nextbtn'); if(b) b.disabled=false;
}
function nextQuestion(timedOut=false){
  clearQuizTimer();
  if(quizState.cur < QUIZ_SIZE-1){
    quizState.cur++;
    render(); window.scrollTo(0,0);
    startTimer();
  } else {
    finishQuiz();
  }
}
async function finishQuiz(){
  clearQuizTimer();
  const {hits,total}=POPCore.scoreQuiz(quizState.list, quizState.answers);
  const score=Math.round(hits/total*100);
  const passed=POPCore.aprovou(hits, PASS_MIN);
  const p=pop(activePop);
  const today=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const detail={qs:quizState.list, ans:quizState.answers.slice()};
  meuProgresso[p.id]={status:passed?'aprovado':'reprovado', hits, score, date:today, detail};
  salvarProgressoLocal();
  const resultado={matricula:session.matricula,nome:session.nome,setor:session.setor,pop_id:p.id,pop_codigo:p.code,status:passed?'aprovado':'reprovado',score,acertos:hits,total,detalhe:detail};
  try{ await POPApi.salvar(resultado); }catch{ console.warn('resultado enfileirado para reenvio'); }
  if(passed && !aprovadosServidor.includes(p.id)) aprovadosServidor.push(p.id);
  lastResult={score,hits,total,passed,drawn:quizState.list,answers:quizState.answers.slice()};
  quizState=null;
  screen='result'; render(); window.scrollTo(0,0);
}

function etapaSectionHTML(e){
  const ps=popsEtapa(session.setor, e);

  const meta=metaEtapa(session.setor, e);

  let hint, prog='';
  if(locked){
    hint = `<span class="etapa-lock">🔒 Desbloqueia ao concluir a Etapa 1</span>`;
  } else if(e===1){
    const falta=Math.max(meta-doneN, 0);
    hint = etapaDone(1)
      ? `<span class="etapa-prog ok">✓ Meta atingida · ${doneN} POPs (meta ${meta})</span>`
      : `<span class="etapa-prog"><b>${Math.min(doneN,meta)}/${meta}</b> · faltam ${falta} para concluir</span>`;
    const pct=meta?Math.round(Math.min(doneN,meta)/meta*100):0;
    prog = `<p class="etapa-sub">Para concluir a <b>Etapa 1</b>, leia e responda a avaliação de <b>ao menos ${meta} POPs</b> da sua área. POPs extras contam como reforço.</p>

    hint = `<span class="etapa-prog">${doneN}/${ps.length} concluídos · só questões de alta dificuldade</span>`;
  }
  return `<div class="etapa-head"><h3>${ETAPA_LABEL[e]}</h3>${hint}</div>${prog}

function wireReadGate(){
  const end=$('#endmark'),fill=$('#readfill'),pctEl=$('#readpct'),
        btn=$('#startbtn'),lock=$('#gatelock'),art=$('#article');
  if(!end||!btn||!lock) return;
  let unlocked=false;
  const onScroll=()=>{
    const rect=art.getBoundingClientRect();
    const total=art.offsetHeight-window.innerHeight*0.6;
    const seen=Math.min(Math.max(-rect.top,0),total);
    const pct=total>0?Math.min(Math.round(seen/total*100),100):100;
    fill.style.width=pct+'%';pctEl.textContent=pct+'% lido';
    const endSeen=end.getBoundingClientRect().top<window.innerHeight-40;
    if(endSeen&&!unlocked){
      unlocked=true;btn.disabled=false;
      fill.style.width='100%';pctEl.textContent='100% lido';
      lock.innerHTML='✅ Leitura concluída — avaliação liberada';
      lock.style.color='var(--success)';
    }
  };
  window.addEventListener('scroll',onScroll,{passive:true});
  onScroll();
}

/* ---------- quiz UI ---------- */
function renderQuiz(){
  const p=pop(activePop);
  const i=quizState.cur, q=quizState.list[i];
  const steps=quizState.list.map((_,k)=>
    `<span class="step ${k<i?'done':(k===i?'cur':'')}"></span>`).join('');
  const C=2*Math.PI*24;
  return `
    <div class="quiz">
      <div class="quiz-head">
        <div class="info">
          <h2>Avaliação · ${p.code}</h2>
          <p>Questão ${i+1} de ${QUIZ_SIZE} · sorteio individual · mínimo ${PASS_MIN} acertos</p>
        </div>
        <div class="steps">${steps}</div>
        <div class="timer" id="timer">
          <svg width="54" height="54"><circle class="tk" cx="27" cy="27" r="24"/>
            <circle class="tv" cx="27" cy="27" r="24" stroke-dasharray="${C}" stroke-dashoffset="0"/></svg>
          <b>${QTIME}</b>
        </div>
      </div>
      <div class="question">
        <div class="qn">QUESTÃO ${i+1}</div>
        <div class="qt">${q.q}</div>
        ${q.o.map((opt,j)=>`
          <label class="opt ${quizState.answers[i]===j?'sel':''}" onclick="pickOpt(${j})">
            <input type="radio" name="q" ${quizState.answers[i]===j?'checked':''}>
            <span>${opt}</span>
          </label>`).join('')}
      </div>
      <div class="quiz-foot">
        <button class="btn" id="nextbtn" ${quizState.answers[i]===null?'disabled':''} onclick="nextQuestion()">
          ${i===QUIZ_SIZE-1?'Finalizar avaliação':'Confirmar e avançar'}</button>
      </div>
    </div>`;
}

/* ---------- resultado ---------- */
function renderResult(){
  const p=pop(activePop), r=lastResult;
  const rc=r.passed?'var(--success)':'var(--danger)';
  const e1ok=etapaDone(1), e2ok=etapaDone(2), hasE2=temEtapa2();
  const finalDone = e1ok && (!hasE2 || e2ok);
  let certCTA='';
  if(r.passed && finalDone) certCTA=`<button class="btn-gold" onclick="goCert(${hasE2?2:1})">${ICON_CERT}${hasE2?'Certificado final':'Ver meu certificado'}</button>`;
  else if(r.passed && e1ok) certCTA=`<button class="btn-gold" onclick="goCert(1)">${ICON_CERT}Certificado · Etapa 1</button>`;
  const check=r.passed?`
    <svg class="checkmark" viewBox="0 0 52 52"><circle cx="26" cy="26" r="24"/>
      <path d="M15 27l8 8 15-17"/></svg>`:'';
  const reviews=reviewHTML(r.drawn,r.answers);
  return `
    <div class="result" style="--rc:${rc}">
      ${check}
      <div class="score" style="--p:${r.score}"><i><div>
        <b style="color:${rc}">${r.hits}/${QUIZ_SIZE}</b><em>${r.score}% de acerto</em></div></i></div>
      <h2>${r.passed?'Aprovado!':'Quase lá'}</h2>
      <p class="verdict">${r.passed
        ? 'Você atingiu o mínimo de '+PASS_MIN+' acertos. O registro já aparece no painel do gestor.'
        : 'Você precisa acertar ao menos '+PASS_MIN+' de '+QUIZ_SIZE+'. Releia o procedimento e refaça — as questões serão sorteadas novamente.'}</p>
      <div class="actions">
        ${r.passed?'':`<button class="btn" onclick="openPop('${activePop}')">Reler e refazer</button>`}
        ${certCTA}
        <button class="btn ghost" onclick="backToList()">Voltar aos POPs</button>
      </div>
    </div>
    <div class="quiz" style="margin-top:18px">
      <div class="quiz-head"><div class="info"><h2>Gabarito da sua prova</h2>
        <p>${p.title} · questões sorteadas desta tentativa</p></div></div>
      ${reviews}
    </div>`;
}

  const corpoTxt = final
    ? `pela <b>conclusão integral</b> da trilha de capacitação — <b>${d.total} Procedimentos Operacionais Padrão</b> (Etapas 1 e 2) do setor ${setorLabel(d.setor)} — no programa de educação permanente em enfermagem, tendo cumprido todos os requisitos com aproveitamento mínimo de ${PASS_MIN}/${QUIZ_SIZE} acertos por avaliação.`
    : `pela conclusão da <b>Etapa 1 (Fundamentos)</b> do setor ${setorLabel(d.setor)} — leitura e aprovação nas avaliações de <b>${d.total} POPs</b> (mínimo de ${ETAPA1_MIN} exigido) — no programa de educação permanente em enfermagem, com aproveitamento mínimo de ${PASS_MIN}/${QUIZ_SIZE} acertos por avaliação.`;
  const rows=(d.pops||[]).map(p=>`<div class="cert-pop"><span class="ck">✓</span>
      <b>${p.code} — ${p.title}</b><span>${p.hits!=null?p.hits+'/'+QUIZ_SIZE:''}${p.date?' · '+p.date:''}</span></div>`).join('');
  return `<div class="cert-inner"><div class="cert-inner2">
        ${final?'<div class="cert-seal" aria-hidden="true"><b>🏆</b><span>Conclusão<br>Final</span></div>':''}
        <span class="logo-chip"><img src="${LOGO()}" alt="HNR" onerror="logoFail(this)"></span>
        <div class="cert-eyebrow">${eyebrow}</div>

        <div class="cert-name">${d.nome}</div>
        <div class="cert-role">${setorLabel(d.setor)} · Matrícula ${d.matricula}</div>

        <div class="cert-pops">${rows}</div>
        <div class="cert-foot">
          <div class="cert-date">Florianópolis, ${todayBR()}</div>
          <div class="cert-sign"><div class="ln"></div><b>Educação Continuada</b><small>Hospital Nereu Ramos</small></div>
        </div>
      </div></div>`;
}

/* ---------- revisão de prova (reuso: resultado do colaborador + drill-down do gestor) ---------- */
function reviewHTML(qs,ans){
  return qs.map((q,i)=>`
    <div class="question" style="border-top:1px solid var(--line)">
      <div class="qn">QUESTÃO ${i+1} ${ans[i]===null?'· <span style="color:var(--danger)">tempo esgotado</span>':''}
        ${ans[i]===q.a?'· <span style="color:var(--success)">acertou</span>':(ans[i]!==null?'· <span style="color:var(--danger)">errou</span>':'')}</div>
      <div class="qt">${q.q}</div>
      ${q.o.map((opt,j)=>{
        let c='';if(j===q.a)c='correct';else if(ans[i]===j)c='wrong';
        return `<div class="opt ${c}" style="cursor:default">${opt}${j===q.a?' ✓':(ans[i]===j?' ✗':'')}</div>`;
      }).join('')}
    </div>`).join('');
}

/* ---------- gestor ---------- */
function renderGestor(){
  const colabs=[...colaboradoresGestor].sort(byNome);
  const popsOrd=[...db.pops].sort(byCode);
  const res=resultadosGestor;
  const byKey={};
  res.forEach(r=>{ byKey[r.matricula+'|'+r.pop_id]=r; });
  const totalPops=db.pops.length;
  const aprovacoes=res.filter(r=>r.status==='aprovado').length;
  let cert1=0, certFinal=0, totalCells=0;
  colabs.forEach(col=>{
    const aprov=new Set(res.filter(r=>r.matricula===col.matricula&&r.status==='aprovado').map(r=>r.pop_id));
    totalCells+=popsDoSetor(col.setor).length;
    const e1=etapaDoneSet(col.setor,1,aprov);
    const e2pops=popsEtapa(col.setor,2);
    if(e1) cert1++;
    if(e1 && (e2pops.length===0 || etapaDoneSet(col.setor,2,aprov))) certFinal++;
  });
  const pendencias=Math.max(0, totalCells - aprovacoes);

  const rows=colabs.map(col=>{
    const aprovCol=new Set(res.filter(r=>r.matricula===col.matricula&&r.status==='aprovado').map(r=>r.pop_id));
    const mineSet=new Set(popsDoSetor(col.setor).map(p=>p.id));
    const totalMine=mineSet.size;
    let done=0;
    const cells=popsOrd.map(p=>{
      if(!mineSet.has(p.id)) return `<td><span class="cell na">—</span></td>`;
      const r=byKey[col.matricula+'|'+p.id];
      let cls='pending', lbl='Pendente';
      if(r){ if(r.status==='aprovado'){ cls='pass'; lbl='Aprovado'; done++; } else { cls='fail'; lbl='Refazer'; } }
      const extra=r?` ${r.acertos}/${r.total}`:'';
      return `<td><span class="cell ${cls}"><span class="ic"></span>${lbl}${extra}</span></td>`;
    }).join('');
    const pct=totalMine?Math.round(done/totalMine*100):0;
    const e1=etapaDoneSet(col.setor,1,aprovCol);
    const e2pops=popsEtapa(col.setor,2);
    const finalOk=e1 && (e2pops.length===0 || etapaDoneSet(col.setor,2,aprovCol));
    const medal=finalOk?' 🏆':(e1?' 🥇':'');
    return `<tr>
      <td class="no-print selcol"><input type="checkbox" class="sel-colab" value="${col.matricula}" aria-label="Selecionar ${col.nome}"></td>
      <td><div class="person"><div class="avatar">${initials(col.nome)}</div>
        <div><b>${col.nome}${medal}</b><small>${setorLabel(col.setor)} · mat. ${col.matricula}</small></div></div></td>
      ${cells}
      <td class="hidesm"><div class="pcompact"><div class="pbar"><i style="width:${pct}%"></i></div><b>${pct}%</b></div></td>
    </tr>`;
  }).join('');

  const vazio = colabs.length===0
    ? `<div class="empty"><div class="ic">🗂</div><b>Nenhum colaborador cadastrado</b><p>Os colaboradores aparecem aqui assim que se identificarem na tela inicial.</p></div>` : '';

  const perpop=popsOrd.map(p=>{
    const eleg=colabs.filter(c=>popsDoSetor(c.setor).some(x=>x.id===p.id)).length;
    const aprov=res.filter(r=>r.pop_id===p.id&&r.status==='aprovado').length;
    const pct=eleg?Math.round(aprov/eleg*100):0;
    return `<div class="perpop-row">
      <span class="code mono">${p.code}</span>
      <div class="nm"><b>${p.title}</b><small>Versão ${p.version} · ${(p.setores||[]).map(setorLabel).join(', ')}</small></div>
      <div class="pcompact"><div class="pbar" style="min-width:120px"><i style="width:${pct}%"></i></div><b>${aprov}/${eleg}</b></div>
    </div>`;
  }).join('');

  return `
    <div class="pagehead gestor-head fade-up">
      <div>
        <h2>Painel do gestor</h2>
        <p>Acompanhamento de leitura e avaliação dos POPs por colaborador. Aprovação: ≥ ${PASS_MIN}/${QUIZ_SIZE} acertos em questões sorteadas.</p>
      </div>
      <div class="report-actions no-print">
        <button class="btn-report" onclick="gerarRelatorioIndividual()">${ICON_REPORT}Relatório individual (selecionados)</button>
        <button class="btn-report" onclick="generateReport()">${ICON_REPORT}Relatório completo (todos)</button>
        <button class="btn-report btn-search" onclick="goBusca()">${ICON_SEARCH}Buscar POPs</button>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="v">${colabs.length}</div><div class="l">Colaboradores</div></div>
      <div class="kpi"><div class="v green">${aprovacoes}</div><div class="l">Aprovações</div></div>
      <div class="kpi kpi-link" onclick="previewCertificado(1)" title="Ver modelo do certificado da Etapa 1"><div class="v" style="color:var(--gold)">${cert1}</div><div class="l">Cert. Etapa 1<span class="see">ver modelo ↗</span></div></div>
      <div class="kpi kpi-link" onclick="previewCertificado(2)" title="Ver modelo do certificado final"><div class="v" style="color:var(--gold)">${certFinal}</div><div class="l">Cert. finais<span class="see">ver modelo ↗</span></div></div>
      <div class="kpi"><div class="v" style="color:var(--warn)">${pendencias}</div><div class="l">Pendências</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Matriz de conclusão</h3><span>marque p/ relatório individual · 🥇 Etapa 1 · 🏆 final</span></div>
      ${vazio || `<div style="overflow-x:auto"><table class="matrix">
        <thead><tr><th class="no-print selcol"><input type="checkbox" onclick="toggleAllColabs(this)" aria-label="Selecionar todos"></th><th>Colaborador</th>${popsOrd.map(p=>`<th>${p.code.replace('POP-ENF-','ENF-')}</th>`).join('')}<th class="hidesm">Progresso</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`}
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Conclusão por POP</h3><span>aprovados / total</span></div>
      <div>${perpop}</div>
    </div>`;
}

function generateReport(){
  const colabs = [...colaboradoresGestor].sort(byNome);
  const popsOrd = [...db.pops].sort(byCode);
  const res = resultadosGestor;
  const byKey = {};
  res.forEach(r=>{ byKey[r.matricula+'|'+r.pop_id]=r; });
  const now = new Date();
  const stamp = now.toLocaleDateString('pt-BR') + ' às ' + now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  // métricas globais
  const totalPops = db.pops.length;
  const aprovacoes = res.filter(r=>r.status==='aprovado').length;
  const totalCells = colabs.reduce((acc,col)=>acc+popsDoSetor(col.setor).length,0);
  const overall = totalCells?Math.round(aprovacoes/totalCells*100):0;
  const isCertified = col=>{
    const aprov=new Set(res.filter(r=>r.matricula===col.matricula&&r.status==='aprovado').map(r=>r.pop_id));
    const mine=popsDoSetor(col.setor);
    return mine.length>0 && mine.every(p=>aprov.has(p.id));

  const certified = colabs.filter(isCertified).length;

/* ---------- relatório individual (gestor) ---------- */
function individualReportPage(col, stamp){
  const res = resultadosGestor.filter(r=>r.matricula===col.matricula);
  const byPid = {}; res.forEach(r=>{ byPid[r.pop_id]=r; });
  const aprov = new Set(res.filter(r=>r.status==='aprovado').map(r=>r.pop_id));
  const stColor = {pass:'#1a8f54',fail:'#d3202a',pending:'#90a3b3',locked:'#b9c4d0'};
  const stLabel = {pass:'Aprovado',fail:'Refazer',pending:'Pendente',locked:'Bloqueado'};
  const e1pops = popsEtapa(col.setor,1), e2pops = popsEtapa(col.setor,2);
  const e1done = etapaDoneSet(col.setor,1,aprov), e2done = etapaDoneSet(col.setor,2,aprov);
  const e2unlocked = e1done;
  const finalOk = e1done && (e2pops.length===0 || e2done);
  const e1ok = e1pops.filter(p=>aprov.has(p.id)).length;
  const e2ok = e2pops.filter(p=>aprov.has(p.id)).length;
  const meta1 = metaEtapa(col.setor,1);
  const totalPops = e1pops.length + e2pops.length, totalOk = e1ok + e2ok;
  const pct1 = meta1?Math.round(Math.min(e1ok,meta1)/meta1*100):0;
  const pct2 = e2pops.length?Math.round(e2ok/e2pops.length*100):0;
  const statusGeral = finalOk?'Trilha concluída':(e1done?'Etapa 1 concluída':'Em andamento');
  const popRows = (ps, etapaNum) => ps.length ? ps.map(p=>{
    const r = byPid[p.id];
    let k = 'pending';
    if(r) k = r.status==='aprovado' ? 'pass' : 'fail';
    else if(etapaNum===2 && !e2unlocked) k = 'locked';
    const ac = r ? `${r.acertos}/${r.total}` : '—';
    const tent = r ? (r.tentativas||1) : '—';
    return `<tr><td class="mono">${p.code}</td><td><b>${p.title}</b><small>v${p.version}</small></td>
      <td class="st"><span class="tag" style="color:${stColor[k]};border-color:${stColor[k]}33;background:${stColor[k]}14">${stLabel[k]}</span></td>
      <td class="cc">${ac}</td><td class="cc">${tent}</td></tr>`;
  }).join('') : `<tr><td colspan="5" style="text-align:center;color:#90a3b3;padding:14px">Nenhum POP nesta etapa para o setor.</td></tr>`;
  return `<div class="page">
    <div class="head">
      <img src="${LOGO()}" alt="HNR">
      <div><div class="eyebrow">Hospital Nereu Ramos · Educação Continuada</div>
        <h1>Relatório Individual de Conclusão</h1></div>
      <div class="meta"><div>Emitido em <b>${stamp}</b></div><div>Critério: ≥ ${PASS_MIN}/${QUIZ_SIZE} acertos</div></div>
    </div>
    <div class="person"><div class="av">${initials(col.nome)}</div>
      <div><b>${col.nome}</b><small>${setorLabel(col.setor)} · Matrícula ${col.matricula} · ${statusGeral}</small></div></div>
    <div class="kpis">
      <div class="kpi"><div class="v">${totalOk}/${totalPops}</div><div class="l">POPs aprovados</div></div>
      <div class="kpi"><div class="v">${pct1}%</div><div class="l">Etapa 1 (${Math.min(e1ok,meta1)}/${meta1} · meta ${meta1})</div></div>
      <div class="kpi"><div class="v">${pct2}%</div><div class="l">Etapa 2 (${e2ok}/${e2pops.length})</div></div>
    </div>
    <div class="certs">
      <div class="certbox ${e1done?'on':''}">${e1done?'✔':'○'} Certificado · Etapa 1 (Fundamentos)</div>
      <div class="certbox ${finalOk?'on':''}">${finalOk?'✔':'○'} Certificado Final</div>
    </div>
    <h2 class="sec">Etapa 1 · Fundamentos <small style="font-weight:600;color:#90a3b3">— conclusão: ao menos ${meta1} POPs da área</small></h2>
    <table><thead><tr><th>Código</th><th>Procedimento</th><th>Situação</th><th>Acertos</th><th>Tentativas</th></tr></thead>
      <tbody>${popRows(e1pops,1)}</tbody></table>
    <h2 class="sec">Etapa 2 · Avançado ${e2unlocked?'':'(bloqueada — conclua a Etapa 1)'}</h2>
    <table><thead><tr><th>Código</th><th>Procedimento</th><th>Situação</th><th>Acertos</th><th>Tentativas</th></tr></thead>
      <tbody>${popRows(e2pops,2)}</tbody></table>
    <div class="foot">
      <div class="disc">Documento gerado automaticamente pelo sistema de POPs do Hospital Nereu Ramos. Dados referentes à data/hora de emissão.</div>
      <div class="sign"><div class="ln"></div><b>Educação Continuada</b><small>Hospital Nereu Ramos</small></div>
    </div>
  </div>`;
}

/* Relatório individual: gera o relatório completo de cada colaborador marcado
   (isolado, 1 por página). Exige ao menos um selecionado. */
function gerarRelatorioIndividual(){
  const checked = [...document.querySelectorAll('.sel-colab:checked')].map(c=>c.value);
  if(!checked.length){ alert('Marque ao menos um colaborador na lista para gerar o relatório individual.'); return; }
  const cols = [...colaboradoresGestor].sort(byNome).filter(c=>checked.includes(c.matricula));
  abrirRelatorioIndividual(cols);
}
function toggleAllColabs(cb){
  document.querySelectorAll('.sel-colab').forEach(c=>{ c.checked = cb.checked; });
}

/* ---------- main render ---------- */
function render(){
  const right=document.getElementById('topbar-right');
  if(!session){if(right)right.innerHTML='';$('#app').innerHTML=renderAuth();return;}
  if(right)right.innerHTML=renderTopRight();
  let html='';
  if(session.role==='gestor'){
    if(screen==='busca')html=renderBuscaGestor();
    else if(screen==='reader')html=renderReader();
    else html=renderGestor();
  }
  else{
    if(screen==='list')html=renderColabList();
    else if(screen==='reader')html=renderReader();
    else if(screen==='quiz')html=renderQuiz();
    else if(screen==='result')html=renderResult();
    else if(screen==='cert')html=renderCert();
  }
  $('#app').innerHTML=html;
  if(screen==='busca'||(session.role==='colaborador'&&screen==='list'))wireSearch();
  if(session.role==='colaborador'&&screen==='reader'&&!consulta)wireReadGate();
  if(session.role==='colaborador'&&screen==='quiz')updateTimerUI();
}

document.getElementById('logo-src').src=LOGO_URI;

(async function init(){
  if(session && session.role==='colaborador'){ carregarProgressoLocal(); await carregarAprovados(); }
  else if(session && session.role==='gestor'){ await carregarResultadosGestor(); }
  render();
})();
</script>
