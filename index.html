<style>
  :root{
    --bg:#f5f8fc; --surface:#fff; --surface-2:#eaf1f9;
    --ink:#1b2733; --muted:#5a6b7b; --faint:#90a3b3;
    --primary:#0a4da2; --primary-dark:#063a7a; --primary-soft:#eaf1f9;
    --line:#dde7f1; --line-strong:#c5d6e8;
    --accent:#d3202a; --accent-soft:#fdeaeb;
    --success:#1a8f54; --success-soft:#e4f4ea;
    --warn:#c97a00; --warn-soft:#fbefd9;
    --danger:#d3202a; --danger-soft:#fdeaeb;
    --pending:#90a3b3; --pending-soft:#eef3f7;
    --gold:#b98a1d; --gold-soft:#fdf6e3;
    --shadow:0 1px 2px rgba(10,77,162,.06),0 8px 24px rgba(10,77,162,.10);
    --radius:16px;
  }
  [data-theme="dark"]{
    --bg:#0e1622; --surface:#16202e; --surface-2:#1c2939;
    --ink:#e8eef5; --muted:#9db0c3; --faint:#64798e;
    --primary:#4d8fe0; --primary-dark:#7db2f0; --primary-soft:#1d3a5c;
    --line:#243447; --line-strong:#33485f;
    --accent:#f0606a; --accent-soft:#3a1d22;
    --success:#46c082; --success-soft:#15301f;
    --warn:#e0a23e; --warn-soft:#332714;
    --danger:#f0606a; --danger-soft:#3a1d22;
    --pending:#64798e; --pending-soft:#1c2939;
    --gold:#e3b54a; --gold-soft:#2e2611;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;
    transition:background .25s,color .25s;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3,h4{margin:0;letter-spacing:-.01em}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes popIn{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}30%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}50%{transform:translateX(-4px)}}
  @keyframes drawCheck{to{stroke-dashoffset:0}}
  .fade-up{animation:fadeUp .3s ease both}
  .shake{animation:shake .5s ease}

  /* ---- top bar ---- */
  .topbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--line)}
  .topbar::before{content:"";display:block;height:3px;
    background:linear-gradient(90deg,var(--primary) 0 50%,var(--accent) 50% 100%)}
  .topbar-inner{max-width:1080px;margin:0 auto;padding:12px 20px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;margin-right:auto}
  .brand .logo-chip{width:46px;height:46px;border-radius:12px;background:#fff;flex:none;
    border:1px solid var(--line);box-shadow:var(--shadow);padding:4px;display:grid;place-items:center}
  .brand .logo-chip img{width:100%;height:100%;object-fit:contain}
  .logo-chip.logo-fail img{display:none}
  .logo-chip.logo-fail::after{content:"HNR";font-weight:900;font-size:13px;color:var(--primary);letter-spacing:.02em}
  .brand b{font-size:15px;font-weight:800;display:block;line-height:1.15;color:var(--primary-dark)}
  .brand span{font-size:12px;color:var(--muted)}
  #topbar-right{display:flex;align-items:center;gap:12px}
  .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
    background:var(--surface);display:grid;place-items:center;font-size:16px;transition:.15s}
  .theme-btn:hover{border-color:var(--primary)}
  .who2{display:flex;align-items:center;gap:9px}
  .who2 .nm b{font-weight:600;color:var(--ink);display:block;font-size:13px;line-height:1.2}
  .who2 .nm small{color:var(--muted);font-size:11.5px}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);
    color:var(--primary);display:grid;place-items:center;font-weight:700;font-size:12px;flex:none}
  .logout{border:1px solid var(--line);background:var(--surface);border-radius:9px;
    padding:8px 13px;font-size:13px;font-weight:600;color:var(--muted);transition:.15s}
  .logout:hover{border-color:var(--accent);color:var(--accent)}

  /* ---- layout ---- */
  main{max-width:1080px;margin:0 auto;padding:26px 20px 80px}
  .pagehead{margin-bottom:20px}
  .pagehead h2{font-family:'Fraunces',serif;font-weight:600;font-size:30px;letter-spacing:-.02em}
  .pagehead p{margin:4px 0 0;color:var(--muted);font-size:14px}
  .proto-note{display:inline-flex;align-items:center;gap:6px;font-size:11px;
    color:var(--warn);background:var(--warn-soft);border-radius:20px;
    padding:3px 10px;font-weight:600;margin-top:10px}
  .gestor-head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}
  .btn-report{flex:none;border:0;border-radius:11px;font-weight:700;font-size:13.5px;
    letter-spacing:.01em;padding:11px 20px;cursor:pointer;color:#fff;white-space:nowrap;
    display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    box-shadow:0 2px 4px rgba(10,77,162,.26),0 7px 18px rgba(10,77,162,.22),
      inset 0 1px 0 rgba(255,255,255,.22);
    transition:transform .16s ease,box-shadow .16s ease,filter .16s ease}
  [data-theme="dark"] .btn-report{color:#0e1622}
  .btn-report svg{width:16px;height:16px;flex:none}
  .btn-report:hover{transform:translateY(-1px);filter:brightness(1.06);
    box-shadow:0 4px 7px rgba(10,77,162,.30),0 12px 24px rgba(10,77,162,.28),
      inset 0 1px 0 rgba(255,255,255,.26)}
  .btn-report:active{transform:translateY(0);
    box-shadow:0 1px 3px rgba(10,77,162,.32),inset 0 1px 2px rgba(0,0,0,.14)}
  .report-actions{display:flex;gap:10px;flex-wrap:wrap}
  .matrix th.selcol,.matrix td.selcol{width:34px;text-align:center;padding-left:6px;padding-right:6px}
  .matrix .sel-colab,.matrix .selcol input{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
  .btn-report:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

  /* ---- jornada (hero) ---- */
  .journey{display:flex;align-items:center;gap:24px;background:linear-gradient(160deg,#0e2c4c,#0c2236);
    color:#e7ecf2;border-radius:var(--radius);padding:22px 26px;margin-bottom:16px;box-shadow:var(--shadow);
    position:relative;overflow:hidden}
  .journey::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-radial-gradient(circle at 88% 18%,rgba(201,162,86,.07) 0 1px,transparent 1px 16px)}
  .journey .ring2{--p:0;width:82px;height:82px;border-radius:50%;flex:none;display:grid;place-items:center;
    background:conic-gradient(#E2C078 calc(var(--p)*1%),rgba(255,255,255,.14) 0)}
  .journey .ring2 i{width:62px;height:62px;border-radius:50%;background:#0c2236;display:grid;place-items:center;
    font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:17px;color:#fff;font-style:normal}
  .journey .jtext{flex:1;min-width:0;position:relative;z-index:1}
  .journey .jhi{font-family:'Fraunces',serif;font-weight:600;font-size:22px}
  .journey .jtext p{margin:4px 0 13px;font-size:13.5px;color:#aebfd0}
  .journey .jtext p b{color:#fff}
  .stepper{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .step{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#8ea3ba;white-space:nowrap;
    border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:6px 13px}
  .step .n{font-family:'IBM Plex Mono',monospace;opacity:.85}
  .step.on{color:#0c2236;background:#E2C078;border-color:#E2C078}
  .step.done{color:#bfe8d0;border-color:rgba(70,192,130,.45)}
  .step.lock{opacity:.6}
  .dash{width:40px;flex:none;height:1px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.3) 0 5px,transparent 5px 10px)}
  /* continue de onde parou */
  .nextup{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);
    border-left:4px solid var(--primary);border-radius:14px;padding:16px 20px;box-shadow:var(--shadow);
    margin-bottom:22px;cursor:pointer;transition:.15s}
  .nextup:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(10,77,162,.12)}
  .nextup .grow{flex:1;min-width:0}
  .nextup .lab{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--primary);font-weight:600}
  .nextup h3{font-size:16px;margin-top:3px}
  .nextup .c{font-size:12px;color:var(--muted);margin-top:2px}

  /* ---- certificate banner ---- */
  .cert-banner{background:linear-gradient(120deg,var(--gold-soft),var(--surface));
    border:1px solid var(--gold);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px 20px;margin-bottom:22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    animation:fadeUp .4s ease both}
  .cert-banner .medal{width:48px;height:48px;border-radius:50%;background:var(--gold);
    color:#fff;display:grid;place-items:center;font-size:22px;flex:none}
  .cert-banner .tx{flex:1;min-width:200px}
  .cert-banner b{font-size:15px}
  .cert-banner p{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .btn-gold{position:relative;border:0;border-radius:11px;font-weight:700;font-size:13.5px;
    letter-spacing:.01em;padding:11px 20px;cursor:pointer;color:#fff;white-space:nowrap;
    display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,#d8a830,#b98a1d 52%,#9a6f12);
    box-shadow:0 2px 4px rgba(140,103,20,.28),0 7px 18px rgba(140,103,20,.24),
      inset 0 1px 0 rgba(255,255,255,.30);
    transition:transform .16s ease,box-shadow .16s ease,filter .16s ease}
  .btn-gold svg{width:16px;height:16px;flex:none}
  .btn-gold:hover{transform:translateY(-1px);filter:brightness(1.05);
    box-shadow:0 4px 7px rgba(140,103,20,.30),0 12px 24px rgba(140,103,20,.30),
      inset 0 1px 0 rgba(255,255,255,.34)}
  .btn-gold:active{transform:translateY(0);
    box-shadow:0 1px 3px rgba(140,103,20,.32),inset 0 1px 2px rgba(0,0,0,.14)}
  .btn-gold:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* ---- pop cards ---- */
  .grid{display:flex;flex-direction:column;gap:10px}
  .popcard{position:relative;background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--line-strong);
    border-radius:13px;padding:15px 20px;box-shadow:0 1px 2px rgba(10,77,162,.05);
    display:grid;grid-template-columns:auto 1fr auto auto;gap:18px;align-items:center;
    transition:border-color .15s,transform .15s,box-shadow .15s;animation:fadeUp .3s ease both}
  .popcard:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .popcard.pass{border-left-color:var(--success)}
  .popcard.next{border-left-color:var(--primary);background:linear-gradient(90deg,var(--primary-soft),var(--surface) 42%)}
  .popcard.fail{border-left-color:var(--danger)}
  .popcard .code{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:var(--primary);
    background:var(--primary-soft);border-radius:7px;padding:5px 9px;white-space:nowrap}
  .popcard.pass .code{color:var(--success);background:var(--success-soft)}
  .popcard .meta{min-width:0}
  .popcard .ptag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.12em;
    text-transform:uppercase;font-weight:600;color:var(--primary);margin-bottom:3px}
  .popcard h3{font-size:15px;font-weight:600;line-height:1.3}
  .popcard .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .badge{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;
    display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .badge.pending{color:var(--faint);background:var(--surface-2)}
  .badge.read{color:var(--warn);background:var(--warn-soft)}
  .badge.pass{color:#9c7a1e;background:#f7eed5;border:1px solid #e6d49b}
  .badge.fail{color:var(--danger);background:var(--danger-soft)}
  .badge.locked{color:var(--faint);background:var(--surface-2)}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  /* buscador de POPs */
  .popsearch{margin:6px 0 18px}
  .popsearch .sb{position:relative;display:flex;align-items:center}
  .popsearch .sb svg{position:absolute;left:14px;width:18px;height:18px;color:var(--faint);pointer-events:none}
  .popsearch input{width:100%;font-family:inherit;font-size:14.5px;padding:12px 40px 12px 42px;
    border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink);
    transition:border-color .15s,box-shadow .15s}
  .popsearch input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .popsearch .clr{position:absolute;right:8px;border:0;background:transparent;color:var(--muted);
    font-size:18px;cursor:pointer;padding:6px 9px;border-radius:8px;line-height:1}
  .popsearch .clr:hover{background:var(--surface-2)}
  .popsearch.locked input{cursor:not-allowed;background:var(--surface-2);color:var(--faint)}
  .popsearch.locked .sb svg{color:var(--faint)}
  .popsearch .hint{margin-top:7px;font-size:12.5px;color:var(--faint)}
  .res-head{font-size:13px;color:var(--muted);font-weight:600;margin:4px 0 10px}
  .res-head b{color:var(--ink)}
  .pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .pill{font-size:11px;font-weight:600;color:var(--primary);background:var(--primary-soft);
    padding:2px 8px;border-radius:20px}
  .pill.mine{color:var(--success);background:var(--success-soft)}
  .hi{background:var(--warn-soft);color:var(--warn);border-radius:3px;padding:0 2px;font-weight:700}
  /* etapas */
  .etapa-head{display:flex;align-items:baseline;gap:14px;margin:30px 0 6px;flex-wrap:wrap}
  .etapa-head h2,.etapa-head h3{font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:-.01em}
  .etapa-prog{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--muted)}
  .etapa-prog b{color:var(--success)}
  .etapa-prog.ok{color:var(--success);font-weight:600}
  .etapa-lock{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9c7a1e;font-weight:500}
  .etapa-sub{margin:2px 0 10px;color:var(--muted);font-size:13px}
  .etapa-bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin:8px 0 16px}
  .etapa-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#4d8fe0);border-radius:99px;transition:width .4s ease}
  .popcard.is-locked{opacity:.62;border-left-color:var(--line-strong)}
  .popcard.is-locked:hover{transform:none;box-shadow:0 1px 2px rgba(10,77,162,.05)}
  .btn{border:0;border-radius:9px;font-weight:600;font-size:13.5px;padding:9px 16px;
    background:var(--primary);color:#fff;transition:.15s}
  .btn:hover{background:var(--primary-dark)}
  .btn:disabled{background:var(--pending-soft);color:var(--faint);cursor:not-allowed}
  [data-theme="dark"] .btn{color:#0e1622}
  .btn.ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--line)}
  .btn.warn{background:var(--danger-soft);color:var(--danger)}
  .btn.warn:hover{background:#f9d9dc}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.block{width:100%;padding:13px;font-size:15px}

  /* ---- reading top ---- */
  .readtop{position:sticky;top:66px;z-index:40;background:var(--bg);margin:-26px -20px 0;padding:14px 20px 12px}
  .readtop .row{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .readtop .back{border:1px solid var(--line);background:var(--surface);border-radius:8px;
    padding:7px 12px;font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px}
  .readtop .label{font-size:12.5px;color:var(--muted);font-weight:600;white-space:nowrap}
  .readbar{height:6px;background:var(--line);border-radius:20px;flex:1;overflow:hidden}
  .readbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--primary),#4d8fe0);border-radius:20px;transition:width .12s}
  #readpct{font-family:'IBM Plex Mono',monospace;font-size:12px}

  /* ---- article + carimbo institucional ---- */
  .article{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;margin-top:16px;animation:fadeUp .3s ease both}
  .stamp{border-bottom:1px solid var(--line);background:var(--surface-2);padding:20px 24px}
  .stamp-grid{border:1.5px solid var(--line-strong);border-radius:10px;overflow:hidden;
    display:grid;grid-template-columns:88px 1fr 170px;background:var(--surface)}
  .stamp-grid>div{padding:12px 14px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    display:flex;flex-direction:column;justify-content:center}
  .stamp-logo{grid-row:1/3;align-items:center}
  .stamp-logo img{width:58px;height:58px;object-fit:contain}
  .stamp-logo small{font-size:8.5px;font-weight:700;color:var(--muted);text-align:center;margin-top:5px;letter-spacing:.03em}
  .stamp-title small{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
  .stamp-title h2{font-family:'Fraunces',serif;font-weight:600;font-size:22px;letter-spacing:-.01em;margin-top:4px;color:var(--ink)}
  .stamp-meta{gap:3px}
  .stamp-meta div{font-size:11.5px;color:var(--muted)}
  .stamp-meta b{color:var(--ink);font-weight:700}
  .stamp-code{font-size:13px;font-weight:800;color:var(--primary)}
  .stamp-row{grid-column:1/4;flex-direction:row !important;gap:26px;border-bottom:0 !important;flex-wrap:wrap}
  .stamp-row span{font-size:11.5px;color:var(--muted)}
  .stamp-row b{color:var(--ink)}
  .stamp-grid>div:nth-child(3),.stamp-grid>div:nth-child(5){border-right:0}

  .article .body{padding:26px 28px;max-width:78ch;margin:0 auto}
  .sec{margin-bottom:34px}
  .sec:last-child{margin-bottom:0}
  .sec h3{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--primary);
    display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .sec h3 .n{width:24px;height:24px;border-radius:7px;background:var(--primary-soft);
    color:var(--primary);display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;flex:none}
  .sec p{margin:0 0 12px;font-size:16px;line-height:1.65;color:var(--ink)}
  .sec p,.sec li{opacity:.92}
  .sec ul{margin:0;padding-left:0;list-style:none}
  .sec li{font-size:16px;line-height:1.6;padding:6px 0 6px 24px;position:relative}
  .sec li::before{content:"";position:absolute;left:4px;top:15px;width:6px;height:6px;
    border-radius:2px;background:var(--primary)}
  .sec li b{font-weight:700;opacity:1}
  .alert{background:var(--warn-soft);border-left:3px solid var(--warn);border-radius:8px;
    padding:13px 16px;font-size:15px;line-height:1.55;margin-top:10px}
  .ptable{width:100%;border-collapse:collapse;margin:8px 0 4px;font-size:14.5px;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden}
  .ptable th{background:var(--primary-soft);color:var(--primary-dark);font-size:12px;
    text-transform:uppercase;letter-spacing:.04em;padding:9px 13px;text-align:left}
  [data-theme="dark"] .ptable th{color:var(--primary)}
  .ptable td{padding:9px 13px;border-top:1px solid var(--line)}
  .ptable tr:nth-child(even) td{background:var(--surface-2)}
  .ptable tr.hl td{background:var(--success-soft);font-weight:600}
  .ptable td:first-child{font-weight:600}
  .endmark{text-align:center;padding:18px;color:var(--faint);font-size:13px;
    border-top:1px dashed var(--line-strong);margin-top:14px}

  .quizgate{margin-top:18px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;text-align:center;animation:fadeUp .3s ease both}
  .quizgate h3{font-size:17px}
  .quizgate p{color:var(--muted);font-size:14px;margin:6px 0 16px}
  .quizgate .lock{font-size:13px;color:var(--warn);font-weight:600;margin-bottom:14px;
    display:flex;align-items:center;justify-content:center;gap:7px}
  .rules{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
  .rule{font-size:12px;font-weight:600;color:var(--muted);background:var(--surface-2);
    border:1px solid var(--line);border-radius:20px;padding:5px 12px;display:inline-flex;gap:6px;align-items:center}

  /* ---- quiz stepper ---- */
  .quiz{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;margin-top:16px;animation:fadeUp .25s ease both}
  .quiz-head{padding:20px 26px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .quiz-head .info{flex:1;min-width:180px}
  .quiz-head h2{font-size:17px}
  .quiz-head p{color:var(--muted);font-size:13px;margin:3px 0 0}
  .steps{display:flex;gap:6px}
  .step{width:26px;height:6px;border-radius:4px;background:var(--line)}
  .step.cur{background:var(--primary)}
  .step.done{background:var(--success)}
  .timer{position:relative;width:54px;height:54px;flex:none}
  .timer svg{transform:rotate(-90deg)}
  .timer circle{fill:none;stroke-width:5}
  .timer .tk{stroke:var(--line)}
  .timer .tv{stroke:var(--primary);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s}
  .timer.warn .tv{stroke:var(--warn)}
  .timer.crit .tv{stroke:var(--danger)}
  .timer b{position:absolute;inset:0;display:grid;place-items:center;font-size:14px}
  .timer.crit b{color:var(--danger)}
  .question{padding:24px 26px}
  .question .qn{font-size:12px;font-weight:700;color:var(--primary)}
  .question .qt{font-size:16.5px;font-weight:600;margin:8px 0 18px;line-height:1.5}
  .opt{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:9px;cursor:pointer;font-size:15px;transition:.12s;line-height:1.45}
  .opt:hover{border-color:var(--primary);background:var(--surface-2)}
  .opt input{margin-top:3px;accent-color:var(--primary)}
  .opt.sel{border-color:var(--primary);background:var(--primary-soft)}
  .opt.correct{border-color:var(--success);background:var(--success-soft)}
  .opt.wrong{border-color:var(--danger);background:var(--danger-soft)}
  .quiz-foot{padding:18px 26px;border-top:1px solid var(--line);display:flex;justify-content:flex-end}

  /* ---- result ---- */
  .result{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:34px 28px;text-align:center;animation:fadeUp .3s ease both}
  .result .score{--p:0;width:124px;height:124px;border-radius:50%;margin:0 auto 18px;
    background:conic-gradient(var(--rc) calc(var(--p)*1%),var(--line) 0);display:grid;place-items:center;
    animation:popIn .5s cubic-bezier(.2,.9,.3,1.4) both}
  .result .score i{width:98px;height:98px;background:var(--surface);border-radius:50%;
    display:grid;place-items:center;font-style:normal}
  .result .score b{font-size:26px;line-height:1.1;display:block}
  .result .score em{font-style:normal;font-size:11px;color:var(--muted)}
  .checkmark{width:64px;height:64px;margin:0 auto 14px;display:block}
  .checkmark circle{fill:var(--success-soft);stroke:var(--success);stroke-width:2}
  .checkmark path{fill:none;stroke:var(--success);stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:34;stroke-dashoffset:34;animation:drawCheck .5s .25s ease forwards}
  .result h2{font-size:22px}
  .result .verdict{font-size:14px;color:var(--muted);margin:8px auto 22px;max-width:400px}
  .result .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  /* ---- certificado ---- */
  .cert{background:transparent;margin-top:16px;animation:fadeUp .3s ease both}
  .cert-paper{position:relative;container-type:inline-size;width:100%;aspect-ratio:1000/707;overflow:hidden;
    color:#0C2236;border-radius:4px;box-shadow:0 18px 50px rgba(8,18,33,.35);
    background:
      repeating-radial-gradient(circle at 78% 12%, rgba(12,34,54,.05) 0 1px, transparent 1px 2.4cqw),
      repeating-radial-gradient(circle at 78% 12%, rgba(185,138,62,.06) 0 1px, transparent 1px 3.6cqw),
      radial-gradient(120% 120% at 80% -10%, #ffffff 0%, #FBFAF5 45%, #F4F0E6 100%)}
  .cert-frame{position:absolute;inset:2cqw;border:0.2cqw solid #0C2236;pointer-events:none}
  .cert-frame::after{content:"";position:absolute;inset:0.6cqw;border:0.1cqw solid #B98A3E}
  .cert-paper .cc{position:absolute;width:3.2cqw;height:3.2cqw;border:0.16cqw solid #B98A3E;z-index:3}
  .cert-paper .cc.tl{top:1.4cqw;left:1.4cqw;border-right:0;border-bottom:0}
  .cert-paper .cc.tr{top:1.4cqw;right:1.4cqw;border-left:0;border-bottom:0}
  .cert-paper .cc.bl{bottom:1.4cqw;left:1.4cqw;border-right:0;border-top:0}
  .cert-paper .cc.br{bottom:1.4cqw;right:1.4cqw;border-left:0;border-top:0}
  .cert-paper-in{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;text-align:center;padding:5.2cqw 7cqw 4cqw}
  .cert-top{display:flex;align-items:center;gap:1.1cqw}
  .cert-top img{width:3.2cqw;height:3.2cqw;border-radius:50%}
  .cert-top b{font-size:1.4cqw;font-weight:600;letter-spacing:.02em;color:#0C2236}
  .cert-sub{font-family:'IBM Plex Mono',monospace;font-size:1.05cqw;letter-spacing:.16em;text-transform:uppercase;color:#6a7888;margin-top:.4cqw}
  .cert-eyebrow{margin-top:2.2cqw;font-family:'IBM Plex Mono',monospace;font-size:1.25cqw;letter-spacing:.34em;text-transform:uppercase;color:#8c6718;font-weight:500}
  .cert-paper h2{font-family:'Fraunces',serif;font-optical-sizing:auto;font-weight:600;font-size:4.6cqw;line-height:1;letter-spacing:-.02em;margin:.6cqw 0 0;color:#0C2236}
  .cert-paper .conf{margin-top:2.2cqw;font-size:1.35cqw;color:#6a7888}
  .cert-name{font-family:'Fraunces',serif;font-weight:600;font-size:4cqw;line-height:1.05;margin:.4cqw 0 0;color:#0C2236}
  .cert-rule{width:28cqw;height:1px;margin:.6cqw auto 0;background:repeating-linear-gradient(90deg,#B98A3E 0 .5cqw,transparent .5cqw 1cqw);opacity:.7}
  .cert-role{margin-top:.9cqw;font-family:'IBM Plex Mono',monospace;font-size:1.25cqw;letter-spacing:.06em;color:#3a4a5e}
  .cert-body{max-width:66cqw;margin:2cqw 0 0;font-size:1.37cqw;line-height:1.62;color:#3a4a5e}
  .cert-body b{color:#0C2236;font-weight:600}
  .cert-stats{display:flex;margin:2.2cqw 0 0;border:1px solid rgba(12,34,54,.14);border-radius:1.2cqw;overflow:hidden}
  .cert-stats .st{padding:1.2cqw 2.6cqw;text-align:center}
  .cert-stats .st + .st{border-left:1px solid rgba(12,34,54,.12)}
  .cert-stats .v{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:2.3cqw;color:#0C2236;white-space:nowrap}
  .cert-stats .v.brass{color:#8c6718}
  .cert-stats .l{font-size:1.05cqw;letter-spacing:.12em;text-transform:uppercase;color:#6a7888;margin-top:.2cqw}
  .cert-place{margin:2cqw 0 1.6cqw;font-size:1.15cqw;color:#6a7888}
  .cert-foot{margin-top:auto;width:100%;display:flex;align-items:flex-end;justify-content:space-between;gap:2cqw}
  .cert-verif{text-align:left}
  .cert-verif small{display:block;font-family:'IBM Plex Mono',monospace;font-size:.95cqw;letter-spacing:.12em;text-transform:uppercase;color:#6a7888}
  .cert-verif b{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:1.2cqw;letter-spacing:.06em;color:#0C2236}
  .cert-signs{display:flex;gap:4cqw}
  .cert-sign{text-align:center;min-width:18cqw}
  .cert-sign .ln{height:1px;background:#0C2236;opacity:.55;margin-bottom:.7cqw}
  .cert-sign b{display:block;font-family:'Fraunces',serif;font-weight:500;font-style:italic;font-size:1.4cqw;color:#0C2236}
  .cert-sign small{font-size:1.05cqw;letter-spacing:.06em;text-transform:uppercase;color:#6a7888}
  .cert-seal{position:absolute;right:6.4cqw;top:15cqw;width:11.8cqw;height:11.8cqw;z-index:4;filter:drop-shadow(0 .8cqw 1.6cqw rgba(0,0,0,.28))}
  .cert-seal .cs-ring{position:absolute;inset:0;border-radius:50%;padding:.6cqw;background:repeating-conic-gradient(from 0deg,#E2C078 0deg 2deg,#8c6718 2deg 4deg)}
  .cert-seal .cs-ring::before{content:"";position:absolute;inset:.3cqw;border-radius:50%;background:conic-gradient(from 0deg,#B98A3E,#E2C078,#B98A3E,#8c6718,#B98A3E)}
  .cert-seal .cs-face{position:absolute;inset:1.1cqw;border-radius:50%;background:#FBFAF5;z-index:2;display:grid;place-items:center;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.25) inset}
  .cert-seal .cs-face b{font-family:'Fraunces',serif;font-weight:600;font-size:1.3cqw;color:#8c6718;line-height:1}
  .cert-seal .cs-face small{display:block;font-family:'IBM Plex Mono',monospace;font-size:.7cqw;letter-spacing:.12em;text-transform:uppercase;color:#6a7888;margin-top:.3cqw}
  .cert-actions{display:flex;gap:10px;justify-content:center;margin-top:18px}
  /* modal de pré-visualização do modelo de certificado (gestor) */
  .cert-modal{position:fixed;inset:0;z-index:60;display:none;background:rgba(8,18,33,.62);
    padding:26px 14px;overflow:auto}
  .cert-modal.open{display:flex;align-items:flex-start;justify-content:center}
  .cm-card{background:var(--surface);border-radius:14px;max-width:1060px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .cm-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line)}
  .cm-head b{flex:1;font-size:14.5px}
  .cm-note{font-size:11.5px;color:var(--muted)}
  .cm-close{border:0;background:var(--surface-2);color:var(--ink);border-radius:8px;
    padding:7px 13px;font-weight:600;cursor:pointer}
  .cm-close:hover{background:var(--line)}
  .cm-body{padding:18px}
  .cm-body .cert.cert-preview{box-shadow:none;padding:0}
  .kpi-link{cursor:pointer;transition:.15s}
  .kpi-link:hover{border-color:#e6d49b;transform:translateY(-1px)}
  .kpi .see{display:block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;color:#9c7a1e;font-weight:500;margin-top:3px}

  /* ---- gestor: dashboard ---- */
  .present{display:grid;grid-template-columns:auto 1fr;gap:30px;background:linear-gradient(160deg,#0e2c4c,#0c2236);
    color:#e7ecf2;border-radius:var(--radius);padding:24px 28px;margin-bottom:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;animation:fadeUp .3s ease both}
  .present::after{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-radial-gradient(circle at 92% 14%,rgba(201,162,86,.06) 0 1px,transparent 1px 18px)}
  .present .big{position:relative;z-index:1;display:flex;align-items:center;gap:20px}
  .present .pring{--p:0;width:104px;height:104px;border-radius:50%;flex:none;display:grid;place-items:center;
    background:conic-gradient(#46c082 calc(var(--p)*1%),rgba(255,255,255,.13) 0)}
  .present .pring i{width:80px;height:80px;border-radius:50%;background:#0c2236;display:flex;flex-direction:column;align-items:center;justify-content:center;font-style:normal}
  .present .pring i b{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:24px;color:#fff}
  .present .pring i span{font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:#8ea3ba;margin-top:1px}
  .present .lead .k{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#E2C078}
  .present .lead h3{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin-top:3px;color:#fff}
  .present .lead p{font-size:13px;color:#aebfd0;margin:5px 0 0}
  .bysetor{position:relative;z-index:1;display:grid;grid-template-columns:repeat(2,1fr);gap:10px 24px;align-content:center}
  .sbar{display:grid;grid-template-columns:96px 1fr 42px;align-items:center;gap:11px;font-size:12px}
  .sbar .nm{color:#cdd9e6;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sbar .track{height:7px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden}
  .sbar .track i{display:block;height:100%;background:linear-gradient(90deg,#46c082,#E2C078);border-radius:99px}
  .sbar .pc{font-family:'IBM Plex Mono',monospace;color:#fff;text-align:right}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);animation:fadeUp .3s ease both}
  .kpi .v{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:30px;line-height:1;color:var(--ink)}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:7px}
  .kpi .v.green{color:var(--success)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px;animation:fadeUp .3s ease both}
  .panel-head{padding:15px 20px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .panel-head h3{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
  .panel-head span{font-size:12px;color:var(--muted)}
  .legend{display:flex;gap:14px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
  .lg-pass{background:var(--success)}.lg-fail{background:var(--danger)}.lg-pend{background:#eef3f8;border:1px solid var(--line-strong)}.lg-na{background:#f1f5f9}
  .mwrap{overflow-x:auto}
  .matrix{border-collapse:separate;border-spacing:0;font-size:12.5px;min-width:100%}
  .matrix th,.matrix td{padding:0;text-align:center}
  .matrix thead th{position:sticky;top:0;background:var(--surface-2);font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;font-weight:600;color:var(--muted);padding:10px 6px;border-bottom:1px solid var(--line);white-space:nowrap}
  .matrix th.person-h,.matrix td.person-c{position:sticky;left:0;z-index:2;background:var(--surface);text-align:left;
    padding:9px 16px;border-bottom:1px solid var(--line);box-shadow:1px 0 0 var(--line)}
  .matrix thead th.person-h{z-index:3;background:var(--surface-2)}
  .matrix tbody tr:last-child td{border-bottom:0}
  .person{display:flex;align-items:center;gap:10px;min-width:210px}
  .person .selc{accent-color:var(--primary);width:15px;height:15px;cursor:pointer;flex:none}
  .person .avatar{width:32px;height:32px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;font-weight:700;font-size:12px;flex:none}
  .person b{font-weight:600;font-size:13px;white-space:nowrap}
  .person small{display:block;color:var(--faint);font-size:11px}
  .matrix td.cellw{padding:5px;border-bottom:1px solid var(--line)}
  .cell{width:38px;height:30px;border-radius:6px;display:grid;place-items:center;margin:0 auto;
    font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px}
  .cell.pass{background:var(--success);color:#fff}
  .cell.fail{background:var(--danger);color:#fff}
  .cell.pending{background:#eef3f8;color:var(--faint);border:1px solid var(--line)}
  .cell.na{background:transparent;color:#cdd7e0}
  .matrix td.prog{position:sticky;right:0;background:var(--surface);padding:8px 16px;border-bottom:1px solid var(--line);box-shadow:-1px 0 0 var(--line)}
  .matrix th.prog-h{position:sticky;right:0;z-index:3;background:var(--surface-2)}
  .pcompact{display:flex;align-items:center;gap:9px;min-width:120px}
  .pbar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden;min-width:80px}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#4d8fe0);border-radius:99px}
  .pcompact b{font-family:'IBM Plex Mono',monospace;font-size:12px;width:42px;text-align:right}
  .perpop-row{display:flex;align-items:center;gap:16px;padding:11px 20px;border-bottom:1px solid var(--line)}
  .perpop-row:last-child{border-bottom:0}
  .perpop-row .nm{flex:1;min-width:0}
  .perpop-row .nm b{font-size:13.5px;font-weight:600}
  .perpop-row .nm small{display:block;color:var(--faint);font-size:11.5px}
  .perpop-row .code{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--primary);
    background:var(--primary-soft);border-radius:7px;padding:4px 9px;flex:none}
  .perpop-row .pcompact{flex:none;min-width:150px}

  /* ---- empty state ---- */
  .empty{padding:36px 20px;text-align:center;color:var(--muted)}
  .empty .ic{font-size:30px;margin-bottom:8px}
  .empty b{display:block;color:var(--ink);font-size:14.5px;margin-bottom:3px}
  .empty p{font-size:13px;margin:0}

  /* ---- auth · repaginação "Certidão" (somente tela de portal) ---- */
  .auth-wrap{
    --tinta:#0C2236;--tinta2:#0a1b2c;--cardc:#12304D;--card2:#163a5c;
    --papelc:#E7ECF2;--mutedc:#9BB0C6;--faintc:#7c93a9;
    --azulc:#6FA0DA;--latao:#C9A256;--latao-hi:#E8CE92;--cruzc:#E0606A;
    --linec:rgba(231,236,242,.10);--line2c:rgba(231,236,242,.18);
    position:fixed;inset:0;z-index:30;display:grid;grid-template-columns:1.05fr .95fr;
    overflow:auto;color:var(--papelc);font-family:'Inter',system-ui,sans-serif}
  .auth-wrap::before{content:none}

  .auth-ident{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:56px 52px;
    background:
      repeating-radial-gradient(circle at 30% 42%, rgba(201,162,86,.055) 0 1px, transparent 1px 17px),
      repeating-radial-gradient(circle at 30% 42%, rgba(159,182,207,.05) 0 1px, transparent 1px 27px),
      radial-gradient(120% 90% at 30% 18%, #143150 0%, var(--tinta) 55%, var(--tinta2) 100%)}
  .auth-ident .ident-in{position:relative;z-index:2;max-width:430px;animation:fadeUp .5s ease both}
  .seal{position:relative;width:130px;height:130px;margin-bottom:30px;animation:sealPress .7s cubic-bezier(.2,.8,.2,1) both}
  .seal .ring{position:absolute;inset:0;border-radius:50%;padding:7px;
    background:repeating-conic-gradient(from 0deg,var(--latao-hi) 0deg 2deg,#9c7a32 2deg 4deg);
    box-shadow:0 14px 34px rgba(0,0,0,.5),0 2px 0 rgba(232,206,146,.35) inset,0 -3px 7px rgba(0,0,0,.45) inset}
  .seal .ring::before{content:"";position:absolute;inset:3px;border-radius:50%;
    background:conic-gradient(from 0deg,var(--latao),var(--latao-hi),var(--latao),#9c7a32,var(--latao))}
  .seal .ring::after{content:"";position:absolute;inset:7px;border-radius:50%;border:1px solid rgba(12,34,54,.5)}
  .seal .face{position:absolute;inset:8px;border-radius:50%;overflow:hidden;background:#fff;z-index:2;
    display:grid;place-items:center;box-shadow:0 1px 3px rgba(0,0,0,.35) inset}
  .seal .face img{width:84%;height:84%;object-fit:contain}
  .auth-ident .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--latao-hi);margin-bottom:14px}
  .auth-ident h1{font-family:'Fraunces',serif;font-optical-sizing:auto;font-weight:600;
    font-size:clamp(34px,4.1vw,56px);line-height:1;letter-spacing:-.015em;margin:0 0 16px}
  .auth-ident h1 span{display:block}
  .auth-ident h1 .thin{font-weight:400;font-style:italic;color:var(--azulc)}
  .auth-ident .lede{font-size:14.5px;color:var(--mutedc);max-width:370px;margin:0 0 26px}
  .auth-ident .heritage{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--faintc);letter-spacing:.04em}
  .auth-ident .heritage .mono{font-family:'IBM Plex Mono',monospace}
  .auth-ident .heritage .gl-rule{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--latao) 0 4px,transparent 4px 9px);opacity:.5}

  .auth-panel{display:flex;flex-direction:column;justify-content:center;padding:48px 52px;
    background:linear-gradient(180deg,#0e273e,#0b1f33);border-left:1px solid var(--line2c)}
  .auth-wrap .auth-card{width:100%;max-width:400px;margin:0 auto;background:transparent;border:0;
    box-shadow:none;padding:0;border-radius:0;animation:fadeUp .45s ease both}
  .auth-wrap .auth-head{text-align:left;margin-bottom:22px}
  .auth-wrap .auth-head .logo-chip{display:none}
  .auth-wrap .auth-head h2{font-family:'Fraunces',serif;font-weight:500;font-size:26px;letter-spacing:-.01em;color:var(--papelc)}
  .auth-wrap .auth-head p{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--faintc);margin-top:9px}
  .auth-wrap .auth-choice{display:grid;gap:13px}
  .auth-wrap .choice-btn{display:flex;align-items:center;gap:15px;text-align:left;width:100%;cursor:pointer;
    background:var(--cardc);border:1px solid var(--line2c);border-radius:15px;padding:17px 19px;color:var(--papelc);
    transition:.18s;position:relative;overflow:hidden}
  .auth-wrap .choice-btn::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:.18s}
  .auth-wrap .choice-btn:hover{transform:translateY(-2px);border-color:rgba(111,160,218,.5);background:var(--card2)}
  .auth-wrap .choice-btn:hover::before{background:var(--azulc)}
  .auth-wrap .choice-btn .ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;flex:none}
  .auth-wrap .choice-btn .ic svg{width:22px;height:22px}
  .auth-wrap .ic-blue{background:rgba(111,160,218,.16);color:var(--azulc)}
  .auth-wrap .ic-red{background:rgba(224,96,106,.14);color:var(--cruzc)}
  .auth-wrap .choice-btn b{font-size:15.5px;display:block;font-weight:600}
  .auth-wrap .choice-btn small{font-size:12.5px;color:var(--mutedc)}
  .auth-wrap .choice-btn .chev{margin-left:auto;color:var(--faintc);font-size:20px;transition:.18s}
  .auth-wrap .choice-btn:hover .chev{color:var(--papelc);transform:translateX(3px)}
  .auth-wrap .field{margin-bottom:14px}
  .auth-wrap .field label{display:block;font-size:12px;font-weight:600;color:var(--mutedc);margin-bottom:6px}
  .auth-wrap .field input,.auth-wrap .field select{width:100%;font-family:inherit;font-size:14.5px;padding:12px 14px;
    border-radius:11px;background:rgba(0,0,0,.22);border:1px solid var(--line2c);color:var(--papelc);transition:.15s}
  .auth-wrap .field input::placeholder{color:var(--faintc)}
  .auth-wrap .field input:focus,.auth-wrap .field select:focus{outline:none;border-color:var(--azulc);box-shadow:0 0 0 3px rgba(111,160,218,.18)}
  .auth-wrap .field select{background:#12304d}
  .auth-wrap .field select option{background:#12304d;color:var(--papelc)}
  .auth-wrap #cs-matricula,.auth-wrap #c-matricula{font-family:'IBM Plex Mono',monospace;letter-spacing:.08em}
  .auth-wrap .hint-cert{display:block;margin-top:6px;font-size:11px;color:var(--faintc)}
  .auth-wrap .btn.block{width:100%;border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;color:#fff;
    background:#0A4DA2;border-radius:12px;padding:14px;margin-top:6px;transition:.15s;box-shadow:0 8px 20px rgba(10,77,162,.4)}
  .auth-wrap .btn.block:hover{background:#0c5ec4;transform:translateY(-1px)}
  .auth-wrap .auth-err{display:none;background:rgba(224,96,106,.12);color:#f3a3a8;border:1px solid rgba(224,96,106,.3);
    border-radius:10px;padding:10px 13px;font-size:13px;margin-bottom:14px;font-weight:500}
  .auth-wrap .auth-back{background:transparent;border:0;color:var(--faintc);font-size:13px;font-weight:600;
    margin-top:14px;padding:8px;width:100%;cursor:pointer}
  .auth-wrap .auth-back:hover{color:var(--papelc)}
  @keyframes sealPress{0%{transform:scale(1.08);opacity:0}60%{transform:scale(.99)}100%{transform:scale(1);opacity:1}}
  @media(max-width:860px){
    .auth-wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    .auth-ident{padding:52px 24px 34px;text-align:center;align-items:center}
    .auth-ident .ident-in{display:flex;flex-direction:column;align-items:center}
    .seal{width:104px;height:104px;margin-bottom:22px}
    .auth-ident .lede{margin-left:auto;margin-right:auto}
    .auth-ident .heritage{width:100%;max-width:340px}
    .auth-panel{padding:30px 22px 50px;border-left:0;border-top:1px solid var(--line2c)}
    .auth-wrap .auth-head{text-align:center}
  }

  @media(max-width:640px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .present{grid-template-columns:1fr;gap:18px}
    .bysetor{grid-template-columns:1fr}
    .present .big{gap:16px}
    .present .pring{width:88px;height:88px}.present .pring i{width:68px;height:68px}
    .topbar-inner{padding:10px 14px}
    main{padding:18px 14px 70px}
    .brand span{display:none}
    .popcard{grid-template-columns:auto 1fr;gap:10px 14px}
    .popcard .badge{grid-column:2;justify-self:start}
    .popcard .btn{grid-column:1/3;justify-self:stretch;justify-content:center}
    .journey{flex-direction:column;align-items:flex-start;gap:18px}
    .nextup{flex-wrap:wrap}
    .article .body{padding-left:18px;padding-right:18px}
    .stamp{padding:14px}
    .stamp-grid{grid-template-columns:64px 1fr}
    .stamp-grid>div:nth-child(3){grid-column:1/3;border-right:0;flex-direction:row;gap:14px}
    .stamp-logo img{width:44px;height:44px}
    .stamp-row{grid-column:1/3}
    .matrix .hidesm{display:none}
  }

  @media print{
    body{background:#fff}
    .topbar,.no-print,.proto-note{display:none !important}
    main{padding:0;max-width:none}
    .cert{box-shadow:none;padding:0;margin:0}
    .cert-paper{box-shadow:none;border-radius:0}
    .cert-actions{display:none}
    @page{size:A4 landscape;margin:8mm}
  }
</style>
</head>

const $ = s => document.querySelector(s);
const pop = id => db.pops.find(p=>p.id===id);
// escapa dado controlado pelo usuário (nome/setor/matrícula) antes do innerHTML — evita XSS armazenado
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- setores ---------- */
const SETOR_LABELS = {assistencial:'Assistencial', uti:'UTI', cc:'Centro Cirúrgico', ambulatorio:'Ambulatório / Hospital Dia', cme:'CME'};
const setorLabel = s => esc(SETOR_LABELS[s] || s || '—');
// POPs disponíveis para um setor. Setor desconhecido/vazio → todos (fallback p/ dados legados).
function popsDoSetor(setor){
  if(!setor || !SETOR_LABELS[setor]) return db.pops;
  return db.pops.filter(p => Array.isArray(p.setores) && p.setores.includes(setor));
}
function meusPops(){ return popsDoSetor(session && session.setor); }
// ordenação alfabética (pt-BR) — colaboradores por nome, POPs por código
const byNome = (a,b) => (a.nome||'').localeCompare(b.nome||'', 'pt-BR', {sensitivity:'base'});
const byCode = (a,b) => (a.code||'').localeCompare(b.code||'', 'pt-BR', {numeric:true});

function seedColaborador(){ return (session && session.matricula && session.matricula!=='—') ? session.matricula : (session && (session.id||session.email||'anon')) || 'anon'; }
function candidatosEtapaIds(setor, e){ return popsDoSetor(setor).filter(p=>popEtapa(p)===e).sort(byCode).map(p=>p.id); }
function sorteioValido(s){ return s && Array.isArray(s.e1) && Array.isArray(s.e2) && s.e1.length>0 && s.e2.length>0; }
async function garantirSorteio(){
  if(!session || session.role!=='colaborador'){ sorteio=null; return; }
  let s = sorteioValido(sorteio) ? sorteio : null;
  if(!s && POPApi.getSorteio){ try{ s = await POPApi.getSorteio(); }catch{ s=null; } }
  if(!sorteioValido(s)){
    s = POPCore.sortear(candidatosEtapaIds(session.setor,1), candidatosEtapaIds(session.setor,2), seedColaborador(), 15);
    if(POPApi.salvarSorteio){ try{ await POPApi.salvarSorteio(s); }catch{} }
  }
  sorteio = s;
}

/* ---------- etapas / 2 certificados ----------
   Trilha do colaborador = POPs do seu setor, divididos por etapa (campo p.etapa).
   Etapa 1 → 1º certificado. Etapa 2 (questões só de alta dificuldade) fica
   bloqueada até concluir a Etapa 1; ao concluí-la, libera o certificado final. */
const ETAPA_LABEL = {1:'Etapa 1 · Fundamentos', 2:'Etapa 2 · Avançado'};
const popEtapa = p => (p && p.etapa===2) ? 2 : 1;
// pool de candidatos do setor por etapa (usado no sorteio e no fallback do gestor)
function popsEtapa(setor, e){ return popsDoSetor(setor).filter(p => popEtapa(p)===e).sort(byCode); }
// ids da seção (15 sorteados) de um colaborador {setor, sorteio}
function secaoIds(col, e){
  const s = col && col.sorteio, key = e===1?'e1':'e2';
  if(s && Array.isArray(s[key]) && s[key].length) return s[key];
  return [];
}
// POPs da seção do colaborador LOGADO, em objetos, ordenados por código
function trilhaEtapa(e){ return secaoIds({setor:(session&&session.setor), sorteio}, e).map(pop).filter(Boolean).sort(byCode); }
function metaEtapa(col, e){ return secaoIds(col, e).length; }
function aprovadosEtapaSet(col, e, aprovSet){ return secaoIds(col,e).filter(id=>aprovSet.has(id)).length; }
function aprovadosEtapa(e){ const set=new Set(aprovadosServidor); return aprovadosEtapaSet({setor:(session&&session.setor), sorteio}, e, set); }
function etapaDoneSet(col, e, aprovSet){ const meta=metaEtapa(col,e); return meta>0 && aprovadosEtapaSet(col,e,aprovSet) >= meta; }
function etapaDone(e){ const meta=metaEtapa({setor:(session&&session.setor), sorteio}, e); return meta>0 && aprovadosEtapa(e) >= meta; }
function etapa2Unlocked(){ return etapaDone(1); }
function temEtapa2(){ return trilhaEtapa(2).length>0; }

function statusOf(pid){
  if(POPCore.isLocked(pid, aprovadosServidor)){
    const m=meuProgresso[pid]||{};
    return {k:'pass', label:'Aprovado', locked:true, hits:m.hits, score:m.score, date:m.date};
  }
  const p=pop(pid);
  if(p && popEtapa(p)===2 && !etapa2Unlocked()) return {k:'locked', label:'Bloqueado'};
  const m=meuProgresso[pid];
  if(m && m.status==='reprovado') return {k:'fail', label:'Refazer', hits:m.hits, score:m.score, date:m.date};
  return {k:'pending', label:'Pendente'};
}
function userProgress(){
  const mine=meusPops();
  const total=mine.length;
  const done=mine.filter(p=>POPCore.isLocked(p.id, aprovadosServidor)).length;
  return {done,total,pct: total?Math.round(done/total*100):0};
}

async function criarConta(){
  const nome=fval('#cs-nome'), setor=fval('#cs-setor'), matricula=fval('#cs-matricula'),
        email=fval('#cs-email'), senha=fval('#cs-pass');
  if(!nome||!setor||!email||!senha){ authErr('Preencha nome, setor, e-mail e senha.'); return; }
  if(senha.length<6){ authErr('A senha precisa de ao menos 6 caracteres.'); return; }
  const r=await POPApi.signUp({nome, setor, matricula, email, senha});
  if(!r.ok){ authErr(r.erro || 'Não foi possível criar a conta.'); return; }
  if(!r.hasSession){ authView='colab'; render(); authErr('Conta criada! Confirme seu e-mail e depois entre.'); return; }
  aplicarPerfil(r.profile);
  salvarSessao(); carregarProgressoLocal();
  await carregarAprovados();
  await garantirSorteio();
  screen='list'; render(); window.scrollTo(0,0);
}

async function carregarAprovados(){

    aprovadosServidor=r.aprovados||[];
  }catch{ aprovadosServidor=[]; }
}

const normTxt = PortalCore.normTxt;
function popIndex(p){
  if(p._idx) return p._idx;
  const secs = (p.sections||[]).map(s =>
    (s.h||'')+' '+(s.sub||'')+' '+(s.note||'')+' '+((s.items||[]).join(' '))
  ).join(' ');
  p._idx = normTxt([p.code,p.title,p.executantes,p.origem,secs].join(' '));
  return p._idx;
}
function searchPops(q){
  const nq = normTxt(q).trim();
  if(nq.length < 2) return [];
  const mineSet = new Set(meusPops().map(p=>p.id));
  return db.pops
    .map(p=>{
      const nt = normTxt(p.title), nc = normTxt(p.code);
      let rank;
      if(nt.includes(nq)) rank=0;
      else if(nc.includes(nq)) rank=1;
      else if(popIndex(p).includes(nq)) rank=2;
      else return null;
      return {p, rank, mine:mineSet.has(p.id)};
    })
    .filter(Boolean)
    .sort((a,b)=> a.rank-b.rank || byCode(a.p,b.p));
}
function highlight(text, q){
  const nq = normTxt(q).trim();
  if(nq.length<2) return text;
  const nt = normTxt(text);
  const i = nt.indexOf(nq);
  if(i<0) return text;
  return text.slice(0,i)+'<span class="hi">'+text.slice(i,i+q.trim().length)+'</span>'+text.slice(i+q.trim().length);
}

  clearQuizTimer(); activePop=id; consulta=true; screen='reader'; render(); window.scrollTo(0,0);
}

/* ---------- quiz engine (sorteio + cronômetro) ---------- */
function startQuiz(){
  const p=pop(activePop);
  if(POPCore.isLocked(activePop, aprovadosServidor)){ alert('Você já foi aprovado neste POP. Não é possível refazer.'); return; }
  if(popEtapa(p)===2 && !etapa2Unlocked()){ alert('Conclua a Etapa 1 para desbloquear a Etapa 2.'); return; }
  const drawn=POPCore.drawQuiz(p.pool, QUIZ_SIZE, popEtapa(p)===2 ? 3 : 2);
  quizState={list:drawn,cur:0,answers:Array(QUIZ_SIZE).fill(null),tLeft:QTIME,timerId:null};
  screen='quiz'; render(); window.scrollTo(0,0);
  startTimer();
}
function clearQuizTimer(){ if(quizState&&quizState.timerId){clearInterval(quizState.timerId);quizState.timerId=null;} }
function startTimer(){
  clearQuizTimer();
  quizState.tLeft=QTIME;
  updateTimerUI();
  quizState.timerId=setInterval(()=>{
    quizState.tLeft--;
    if(quizState.tLeft<=0){ nextQuestion(true); return; }
    updateTimerUI();
  },1000);
}
function updateTimerUI(){
  const t=$('#timer'); if(!t||!quizState) return;
  const tv=t.querySelector('.tv'), b=t.querySelector('b');
  const C=2*Math.PI*24;
  tv.style.strokeDasharray=C;
  tv.style.strokeDashoffset=C*(1-quizState.tLeft/QTIME);
  b.textContent=quizState.tLeft;
  t.classList.toggle('warn',quizState.tLeft<=15&&quizState.tLeft>6);
  t.classList.toggle('crit',quizState.tLeft<=6);
}
function pickOpt(j){
  if(!quizState) return;
  quizState.answers[quizState.cur]=j;
  document.querySelectorAll('.opt').forEach((el,k)=>el.classList.toggle('sel',k===j));
  const b=$('#nextbtn'); if(b) b.disabled=false;
}
function nextQuestion(timedOut=false){
  clearQuizTimer();
  if(quizState.cur < QUIZ_SIZE-1){
    quizState.cur++;
    render(); window.scrollTo(0,0);
    startTimer();
  } else {
    finishQuiz();
  }
}
async function finishQuiz(){
  clearQuizTimer();
  const {hits,total}=POPCore.scoreQuiz(quizState.list, quizState.answers);
  const score=Math.round(hits/total*100);
  const passed=POPCore.aprovou(hits, PASS_MIN);
  const p=pop(activePop);
  const today=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const detail={qs:quizState.list, ans:quizState.answers.slice()};
  meuProgresso[p.id]={status:passed?'aprovado':'reprovado', hits, score, date:today, detail};
  salvarProgressoLocal();
  const resultado={matricula:session.matricula,nome:session.nome,setor:session.setor,pop_id:p.id,pop_codigo:p.code,status:passed?'aprovado':'reprovado',score,acertos:hits,total,detalhe:detail};
  try{ await POPApi.salvar(resultado); }catch{ console.warn('resultado enfileirado para reenvio'); }
  if(passed && !aprovadosServidor.includes(p.id)) aprovadosServidor.push(p.id);
  lastResult={score,hits,total,passed,drawn:quizState.list,answers:quizState.answers.slice()};
  quizState=null;
  screen='result'; render(); window.scrollTo(0,0);
}

let nextPopId=null;   // POP "próximo recomendado" (1º pendente/reprovado da trilha)
function popCardHTML(p, idx){
  const s=statusOf(p.id);
  const isLocked=s.k==='locked';
  const isNext = !isLocked && (s.k==='pending'||s.k==='fail') && p.id===nextPopId;
  const rail = isLocked?'is-locked':(s.k==='pass'?'pass':(s.k==='fail'?'fail':(isNext?'next':'')));
  const cta=isLocked?'🔒':(s.k==='pass'?'Revisar':(s.k==='fail'?'Reler e refazer':'Ler POP'));
  const btnCls=isLocked?'':(s.k==='fail'?'warn':(isNext?'':'ghost'));
  const nota = s.hits!=null?s.hits:(s.score!=null?s.score:'—');
  const badge = s.k==='pass'
      ? `<span class="badge pass">🎖 Aprovado · ${nota}/${QUIZ_SIZE}</span>`
      : s.k==='fail'
        ? `<span class="badge fail"><span class="dot"></span>Reprovado · ${nota}/${QUIZ_SIZE}</span>`
        : isLocked
          ? `<span class="badge locked"><span class="dot"></span>Bloqueado</span>`
          : `<span class="badge pending"><span class="dot"></span>Pendente</span>`;
  const tag = isNext ? `<span class="ptag">▸ Próximo recomendado</span>` : '';
  return `<div class="popcard ${rail}" style="animation-delay:${idx*45}ms">
      <span class="code mono">${p.code}</span>
      <div class="meta">${tag}<h3>${p.title}</h3><div class="sub">Versão ${p.version} · ${p.executantes}</div></div>
      ${badge}
      <button class="btn ${btnCls}" ${isLocked?'disabled':`onclick="openPop('${p.id}')"`}>${cta}</button>
    </div>`;
}
function etapaSectionHTML(e){
  const ps=trilhaEtapa(e);
  if(!ps.length) return '';
  const doneN=ps.filter(p=>POPCore.isLocked(p.id, aprovadosServidor)).length;
  const meta=metaEtapa({setor:session.setor, sorteio}, e);
  const locked = e===2 && !etapa2Unlocked();
  let hint, prog='';
  if(locked){
    hint = `<span class="etapa-lock">🔒 Desbloqueia ao concluir a Etapa 1</span>`;
  } else if(e===1){
    const falta=Math.max(meta-doneN, 0);
    hint = etapaDone(1)
      ? `<span class="etapa-prog ok">✓ Meta atingida · ${doneN} POPs (meta ${meta})</span>`
      : `<span class="etapa-prog"><b>${Math.min(doneN,meta)}/${meta}</b> · faltam ${falta} para concluir</span>`;
    const pct=meta?Math.round(Math.min(doneN,meta)/meta*100):0;
    prog = `<p class="etapa-sub">Para concluir a <b>Etapa 1</b>, leia e responda a avaliação de <b>ao menos ${meta} POPs</b> da sua área. POPs extras contam como reforço.</p>

  } else {
    hint = `<span class="etapa-prog">${doneN}/${ps.length} concluídos · só questões de alta dificuldade</span>`;
  }
  return `<div class="etapa-head"><h3>${ETAPA_LABEL[e]}</h3>${hint}</div>${prog}
    <div class="grid">${ps.map((p,i)=>popCardHTML(p,i)).join('')}</div>`;
}

      <div class="tx"><b>Parabéns, ${esc(session.nome.split(' ')[0])}! Trilha concluída.</b>
        <p>Você concluiu as duas etapas (${pr.total} POPs). Certificado final disponível.</p></div>
      <button class="btn-gold" onclick="goCert(2)">${ICON_CERT}Certificado final</button>
    </div>`:'',
  ].join('');
  const falta1=Math.max(e1meta-e1now, 0);
  const hello = e1ok
    ? (hasE2 ? `Etapa 1 concluída! Avance para a Etapa 2.` : `Etapa 1 concluída! ${pr.done} de ${pr.total} POPs aprovados.`)
    : (e1now===0
        ? `Para concluir a Etapa 1, leia e responda ao menos ${e1meta} POPs. Comece pelo primeiro.`
        : `Etapa 1: ${Math.min(e1now,e1meta)} de ${e1meta} POPs concluídos · faltam ${falta1}.`);
  const ringPct = e1ok ? pr.pct : (e1meta?Math.round(Math.min(e1now,e1meta)/e1meta*100):0);
  const ordemTrilha = [...popsEtapa(session.setor,1), ...(etapa2Unlocked()?popsEtapa(session.setor,2):[])];
  const nextPop = ordemTrilha.find(p=>{ const k=statusOf(p.id).k; return k==='pending'||k==='fail'; }) || null;
  nextPopId = nextPop ? nextPop.id : null;
  const step2Cls = !hasE2 ? 'lock' : (e2ok ? 'done' : (etapa2Unlocked() ? 'on' : 'lock'));
  const stepper = `<div class="stepper">
        <span class="step ${e1ok?'done':'on'}"><span class="n">①</span> ${ETAPA_LABEL[1]}</span>
        <span class="dash"></span>
        <span class="step ${step2Cls}"><span class="n">②</span> ${ETAPA_LABEL[2]}${(hasE2&&!etapa2Unlocked())?' 🔒':''}</span>
      </div>`;
  const nextupHTML = nextPop ? `<div class="nextup fade-up" onclick="openPop('${nextPop.id}')">
        <div class="grow"><div class="lab">Continue de onde parou</div>
          <h3>${nextPop.title}</h3><div class="c mono">${nextPop.code} · Versão ${nextPop.version}</div></div>
        <button class="btn" onclick="event.stopPropagation();openPop('${nextPop.id}')">Continuar →</button>
      </div>` : '';
  return `
    <div class="pagehead fade-up">
      <h2>Meus procedimentos</h2>
      <p>Setor <b>${setorLabel(session.setor)}</b> · trilha em 2 etapas. Conclua a <b>Etapa 1 com ao menos ${e1meta} POPs</b> · aprovação: <b>acerte ${PASS_MIN} de ${QUIZ_SIZE}</b>.</p>
    </div>
    ${buscadorBlocoHTML()}
    <div id="list-default">
      ${banners}
      <div class="journey fade-up">
        <div class="ring2" style="--p:${ringPct}"><i>${ringPct}%</i></div>
        <div class="jtext"><div class="jhi">Olá, ${esc(session.nome.split(' ')[0])}</div><p>${hello}</p>${stepper}</div>
      </div>
      ${nextupHTML}
      ${etapaSectionHTML(1)}
      ${etapaSectionHTML(2)}
    </div>
    <div id="search-results" style="display:none"></div>`;
}

/* ---------- leitor ---------- */
function sectionHTML(s){
  let inner='';
  if(s.sub) inner+=`<p style="color:var(--muted);font-size:14px">${s.sub}</p>`;
  if(s.note) inner+=`<p>${s.note}</p>`;
  if(s.table){
    const hl=s.table.hl||[];
    inner+=`<table class="ptable"><thead><tr>${s.table.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${s.table.rows.map((r,i)=>`<tr class="${hl.includes(i)?'hl':''}">${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  }
  if(s.items) inner+=`<ul>${s.items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
  if(s.alert) inner+=`<div class="alert">⚠ ${s.alert}</div>`;
  return `<div class="sec"><h3><span class="n">${s.n}</span>${s.h}</h3>${inner}</div>`;
}

function wireReadGate(){
  const end=$('#endmark'),fill=$('#readfill'),pctEl=$('#readpct'),
        btn=$('#startbtn'),lock=$('#gatelock'),art=$('#article');
  if(!end||!btn||!lock) return;
  let unlocked=false;
  const onScroll=()=>{
    const rect=art.getBoundingClientRect();
    const total=art.offsetHeight-window.innerHeight*0.6;
    const seen=Math.min(Math.max(-rect.top,0),total);
    const pct=total>0?Math.min(Math.round(seen/total*100),100):100;
    fill.style.width=pct+'%';pctEl.textContent=pct+'% lido';
    const endSeen=end.getBoundingClientRect().top<window.innerHeight-40;
    if(endSeen&&!unlocked){
      unlocked=true;btn.disabled=false;
      fill.style.width='100%';pctEl.textContent='100% lido';
      lock.innerHTML='✅ Leitura concluída — avaliação liberada';
      lock.style.color='var(--success)';
    }
  };
  window.addEventListener('scroll',onScroll,{passive:true});
  onScroll();
}

function reviewHTML(qs,ans){
  return qs.map((q,i)=>`
    <div class="question" style="border-top:1px solid var(--line)">
      <div class="qn">QUESTÃO ${i+1} ${ans[i]===null?'· <span style="color:var(--danger)">tempo esgotado</span>':''}

      <div class="qt">${q.q}</div>

        let c='';if(j===q.a)c='correct';else if(ans[i]===j)c='wrong';

/* ---------- gestor ---------- */
function renderGestor(){
  const colabs=[...colaboradoresGestor].sort(byNome);
  const popsOrd=[...db.pops].sort(byCode);
  const res=resultadosGestor;
  const byKey={};
  res.forEach(r=>{ byKey[r.matricula+'|'+r.pop_id]=r; });
  const totalPops=db.pops.length;
  const aprovacoes=res.filter(r=>r.status==='aprovado').length;
  let cert1=0, certFinal=0, totalCells=0;
  colabs.forEach(col=>{
    const aprov=new Set(res.filter(r=>r.matricula===col.matricula&&r.status==='aprovado').map(r=>r.pop_id));
    totalCells+=popsDoSetor(col.setor).length;
    const e1=etapaDoneSet(col,1,aprov);
    const e2pops=secaoIds(col,2);
    if(e1) cert1++;
    if(e1 && (e2pops.length===0 || etapaDoneSet(col,2,aprov))) certFinal++;
  });
  const pendencias=Math.max(0, totalCells - aprovacoes);

  const rows=colabs.map(col=>{
    const aprovCol=new Set(res.filter(r=>r.matricula===col.matricula&&r.status==='aprovado').map(r=>r.pop_id));
    const mineSet=new Set(popsDoSetor(col.setor).map(p=>p.id));
    const totalMine=mineSet.size;
    let done=0;
    const cells=popsOrd.map(p=>{
      if(!mineSet.has(p.id)) return `<td class="cellw"><span class="cell na" title="Não se aplica">—</span></td>`;
      const r=byKey[col.matricula+'|'+p.id];
      if(r && r.status==='aprovado'){ done++; return `<td class="cellw"><span class="cell pass" title="Aprovado ${r.acertos}/${r.total}">${r.acertos}</span></td>`; }
      if(r){ return `<td class="cellw"><span class="cell fail" title="Refazer ${r.acertos}/${r.total}">${r.acertos}</span></td>`; }
      return `<td class="cellw"><span class="cell pending" title="Pendente">·</span></td>`;
    }).join('');
    const pct=totalMine?Math.round(done/totalMine*100):0;
    const e1=etapaDoneSet(col,1,aprovCol);
    const e2pops=secaoIds(col,2);
    const finalOk=e1 && (e2pops.length===0 || etapaDoneSet(col,2,aprovCol));
    const medal=finalOk?' 🏆':(e1?' 🥇':'');
    return `<tr>
      <td class="person-c"><div class="person"><input type="checkbox" class="selc sel-colab no-print" value="${esc(col.matricula)}" aria-label="Selecionar ${esc(col.nome)}"><div class="avatar">${initials(col.nome)}</div>
        <div><b>${esc(col.nome)}${medal}</b><small>${setorLabel(col.setor)} · mat. ${esc(col.matricula)}</small></div></div></td>
      ${cells}
      <td class="prog"><div class="pcompact"><div class="pbar"><i style="width:${pct}%"></i></div><b>${pct}%</b></div></td>
    </tr>`;
  }).join('');

  const vazio = colabs.length===0
    ? `<div class="empty"><div class="ic">🗂</div><b>Nenhum colaborador cadastrado</b><p>Os colaboradores aparecem aqui assim que se identificarem na tela inicial.</p></div>` : '';

  const perpop=popsOrd.map(p=>{
    const eleg=colabs.filter(c=>popsDoSetor(c.setor).some(x=>x.id===p.id)).length;
    const aprov=res.filter(r=>r.pop_id===p.id&&r.status==='aprovado').length;
    const pct=eleg?Math.round(aprov/eleg*100):0;
    return `<div class="perpop-row">
      <span class="code mono">${p.code}</span>
      <div class="nm"><b>${p.title}</b><small>Versão ${p.version} · ${(p.setores||[]).map(setorLabel).join(', ')}</small></div>
      <div class="pcompact"><div class="pbar" style="min-width:120px"><i style="width:${pct}%"></i></div><b>${aprov}/${eleg}</b></div>
    </div>`;
  }).join('');

  const SETORES=Object.keys(SETOR_LABELS);
  const bySetor=SETORES.map(st=>{
    const cs=colabs.filter(c=>c.setor===st);
    let ap=0, el=0;
    cs.forEach(c=>{ const mine=popsDoSetor(c.setor); el+=mine.length;
      const aprov=new Set(res.filter(r=>r.matricula===c.matricula&&r.status==='aprovado').map(r=>r.pop_id));
      ap+=mine.filter(p=>aprov.has(p.id)).length; });
    return {label:setorLabel(st), pct: el?Math.round(ap/el*100):0, n:cs.length};
  }).filter(x=>x.n>0);

      </div>
      ${vazio || `<div class="mwrap"><table class="matrix">
        <thead><tr><th class="person-h"><label style="display:flex;align-items:center;gap:9px;cursor:pointer"><input type="checkbox" class="selc no-print" onclick="toggleAllColabs(this)" aria-label="Selecionar todos">Colaborador</label></th>${popsOrd.map(p=>`<th title="${(p.title||'').replace(/"/g,'&quot;')}">${p.code.replace('POP-','')}</th>`).join('')}<th class="prog-h">Progresso</th></tr></thead>

/* ---------- relatório completo (gestor) ---------- */
function generateReport(){
  const colabs = [...colaboradoresGestor].sort(byNome);
  const popsOrd = [...db.pops].sort(byCode);
  const res = resultadosGestor;
  const byKey = {};
  res.forEach(r=>{ byKey[r.matricula+'|'+r.pop_id]=r; });
  const now = new Date();
  const stamp = now.toLocaleDateString('pt-BR') + ' às ' + now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  // métricas globais
  const totalPops = db.pops.length;
  const aprovacoes = res.filter(r=>r.status==='aprovado').length;
  const totalCells = colabs.reduce((acc,col)=>acc+popsDoSetor(col.setor).length,0);
  const overall = totalCells?Math.round(aprovacoes/totalCells*100):0;
  const isCertified = col=>{
    const aprov=new Set(res.filter(r=>r.matricula===col.matricula&&r.status==='aprovado').map(r=>r.pop_id));
    const mine=popsDoSetor(col.setor);
    return mine.length>0 && mine.every(p=>aprov.has(p.id));
  };
  const certified = colabs.filter(isCertified).length;
  const pendings = Math.max(0, totalCells - aprovacoes);

  const stColor = {pass:'#1a8f54',fail:'#d3202a',pending:'#90a3b3'};
  const stLabel = {pass:'Aprovado',fail:'Refazer',pending:'Pendente'};

  // tabela por colaborador
  const userRows = colabs.map(col=>{
    const mineSet=new Set(popsDoSetor(col.setor).map(p=>p.id));
    const totalMine=mineSet.size;
    let done=0;
    const cells = popsOrd.map(p=>{
      if(!mineSet.has(p.id)) return `<td class="st"><span style="color:#cdd7e0">—</span></td>`;
      const r = byKey[col.matricula+'|'+p.id];
      let k='pending';
      if(r){ k = r.status==='aprovado' ? 'pass' : 'fail'; if(k==='pass') done++; }
      const extra = r ? `<small>${r.acertos}/${r.total}</small>` : '';
      return `<td class="st"><span class="tag" style="color:${stColor[k]};border-color:${stColor[k]}33;background:${stColor[k]}14">${stLabel[k]}</span>${extra}</td>`;
    }).join('');
    const pct = totalMine?Math.round(done/totalMine*100):0;
    const cert = isCertified(col)?'<span class="yes">✔ Sim</span>':'<span class="no">—</span>';
    return `<tr>
      <td class="nm"><b>${esc(col.nome)}</b><small>mat. ${esc(col.matricula)}</small></td>
      <td class="em">${setorLabel(col.setor)}</td>
      ${cells}

      <td class="ct">${cert}</td>
    </tr>`;
  }).join('');

  // tabela por POP
  const popRows = popsOrd.map(p=>{
    const eleg = colabs.filter(c=>popsDoSetor(c.setor).some(x=>x.id===p.id)).length;
    const done = res.filter(r=>r.pop_id===p.id&&r.status==='aprovado').length;
    const pct = eleg?Math.round(done/eleg*100):0;
    return `<tr>
      <td class="mono">${p.code}</td>
      <td><b>${p.title}</b></td>
      <td class="cc">v${p.version}</td>
      <td class="cc">${done}/${eleg}</td>
      <td class="cc"><b>${pct}%</b></td>
    </tr>`;
  }).join('');

  const certList = colabs.filter(isCertified)
    .map(c=>`<li><b>${esc(c.nome)}</b>${c.setor?` · ${setorLabel(c.setor)}`:''}${c.matricula?` · mat. ${esc(c.matricula)}`:''}</li>`).join('')
    || '<li class="muted">Nenhum colaborador concluiu todos os POPs até o momento.</li>';

  const html = `<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
  <title>Relatório de Conclusão · Hospital Nereu Ramos</title>
  <style>
    *{box-sizing:border-box}

    .head img{width:54px;height:54px;object-fit:contain}
    .head h1{font-size:19px;margin:0;color:#063a7a}
    .head .eyebrow{font-size:10.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#5a6b7b;margin-bottom:3px}
    .head .meta{margin-left:auto;text-align:right;font-size:11px;color:#5a6b7b;line-height:1.6}
    h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#0a4da2;margin:26px 0 10px;border-bottom:1px solid #dde7f1;padding-bottom:6px}
    .kpis{display:flex;gap:12px;margin-top:18px}
    .kpi{flex:1;border:1px solid #dde7f1;border-radius:10px;padding:12px 14px;text-align:center;background:#f7fafd}
    .kpi .v{font-size:24px;font-weight:800;color:#0a4da2}
    .kpi .l{font-size:10.5px;color:#5a6b7b;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
    table{width:100%;border-collapse:collapse;font-size:11.5px}
    th{background:#0a4da2;color:#fff;text-align:left;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.03em;font-weight:700}
    td{padding:7px 8px;border-bottom:1px solid #e7eef6;vertical-align:middle}
    tr:nth-child(even) td{background:#f7fafd}
    td.nm b{display:block}td.nm small,td.pc small,td.em{color:#5a6b7b}
    td.nm small{font-size:10px}
    td.st{text-align:center;white-space:nowrap}
    td.st small{display:block;color:#90a3b3;font-size:9.5px;margin-top:2px}
    .tag{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid}
    td.pc{text-align:center}td.pc small{display:block;font-size:9.5px}
    td.ct{text-align:center}.yes{color:#1a8f54;font-weight:700}.no{color:#90a3b3}
    td.cc{text-align:center}.mono{font-family:'Consolas',monospace;font-size:10.5px;color:#0a4da2;font-weight:700}
    .scroll{overflow-x:auto}
    ul.cert{margin:6px 0 0;padding-left:18px}ul.cert li{margin:3px 0}.muted{color:#90a3b3;list-style:none;margin-left:-18px}
    .foot{margin-top:40px;display:flex;justify-content:space-between;align-items:flex-end;gap:20px}
    .sign{text-align:center;min-width:230px}.sign .ln{border-top:1px solid #1b2733;margin-bottom:6px}
    .sign b{display:block;font-size:12px}.sign small{color:#5a6b7b;font-size:10.5px}

  </style></head><body>
    <div class="toolbar no-print">
      <b>Relatório pronto — use “Imprimir / Salvar PDF”.</b>

      </div>
      <div class="meta">
        <div>Emitido em <b>${stamp}</b></div>
        <div>Responsável: <b>Educação Continuada</b></div>
        <div>Critério de aprovação: ≥ ${PASS_MIN}/${QUIZ_SIZE} acertos</div>
      </div>
    </div>

    <div class="kpis">

      <div class="kpi"><div class="v">${totalPops}</div><div class="l">POPs ativos</div></div>
    </div>

    <h2 class="sec">Situação por colaborador</h2>
    <div class="scroll"><table>
      <thead><tr><th>Colaborador</th><th>Setor</th>${popsOrd.map(p=>`<th>${p.code.replace('POP-ENF-','ENF-')}</th>`).join('')}<th>Progresso</th><th>Certificado</th></tr></thead>
      <tbody>${userRows||`<tr><td colspan="${totalPops+4}" style="text-align:center;color:#90a3b3;padding:18px">Nenhum colaborador cadastrado.</td></tr>`}</tbody>
    </table></div>

    <h2 class="sec">Conclusão por POP</h2>
    <table>
      <thead><tr><th>Código</th><th>Procedimento</th><th>Versão</th><th>Aprovados</th><th>%</th></tr></thead>

  const w = window.open('', '_blank');
  if(!w){ alert('Permita pop-ups para gerar o relatório.'); return; }

}

/* ---------- relatório individual (gestor) ---------- */
function individualReportPage(col, stamp){
  const res = resultadosGestor.filter(r=>r.matricula===col.matricula);
  const byPid = {}; res.forEach(r=>{ byPid[r.pop_id]=r; });
  const aprov = new Set(res.filter(r=>r.status==='aprovado').map(r=>r.pop_id));
  const stColor = {pass:'#1a8f54',fail:'#d3202a',pending:'#90a3b3',locked:'#b9c4d0'};
  const stLabel = {pass:'Aprovado',fail:'Refazer',pending:'Pendente',locked:'Bloqueado'};
  const e1pops = secaoIds(col,1).map(pop).filter(Boolean), e2pops = secaoIds(col,2).map(pop).filter(Boolean);
  const e1done = etapaDoneSet(col,1,aprov), e2done = etapaDoneSet(col,2,aprov);
  const e2unlocked = e1done;
  const finalOk = e1done && (e2pops.length===0 || e2done);
  const e1ok = e1pops.filter(p=>aprov.has(p.id)).length;
  const e2ok = e2pops.filter(p=>aprov.has(p.id)).length;
  const meta1 = metaEtapa(col,1);
  const totalPops = e1pops.length + e2pops.length, totalOk = e1ok + e2ok;
  const pct1 = meta1?Math.round(Math.min(e1ok,meta1)/meta1*100):0;
  const pct2 = e2pops.length?Math.round(e2ok/e2pops.length*100):0;
  const statusGeral = finalOk?'Trilha concluída':(e1done?'Etapa 1 concluída':'Em andamento');
  const popRows = (ps, etapaNum) => ps.length ? ps.map(p=>{
    const r = byPid[p.id];
    let k = 'pending';
    if(r) k = r.status==='aprovado' ? 'pass' : 'fail';
    else if(etapaNum===2 && !e2unlocked) k = 'locked';
    const ac = r ? `${r.acertos}/${r.total}` : '—';
    const tent = r ? (r.tentativas||1) : '—';
    return `<tr><td class="mono">${p.code}</td><td><b>${p.title}</b><small>v${p.version}</small></td>
      <td class="st"><span class="tag" style="color:${stColor[k]};border-color:${stColor[k]}33;background:${stColor[k]}14">${stLabel[k]}</span></td>
      <td class="cc">${ac}</td><td class="cc">${tent}</td></tr>`;
  }).join('') : `<tr><td colspan="5" style="text-align:center;color:#90a3b3;padding:14px">Nenhum POP nesta etapa para o setor.</td></tr>`;
  return `<div class="page">
    <div class="head">
      <img src="${LOGO()}" alt="HNR">
      <div><div class="eyebrow">Hospital Nereu Ramos · Educação Continuada</div>
        <h1>Relatório Individual de Conclusão</h1></div>
      <div class="meta"><div>Emitido em <b>${stamp}</b></div><div>Critério: ≥ ${PASS_MIN}/${QUIZ_SIZE} acertos</div></div>
    </div>
    <div class="person"><div class="av">${initials(col.nome)}</div>
      <div><b>${esc(col.nome)}</b><small>${setorLabel(col.setor)} · Matrícula ${esc(col.matricula)} · ${statusGeral}</small></div></div>
    <div class="kpis">
      <div class="kpi"><div class="v">${totalOk}/${totalPops}</div><div class="l">POPs aprovados</div></div>
      <div class="kpi"><div class="v">${pct1}%</div><div class="l">Etapa 1 (${Math.min(e1ok,meta1)}/${meta1} · meta ${meta1})</div></div>
      <div class="kpi"><div class="v">${pct2}%</div><div class="l">Etapa 2 (${e2ok}/${e2pops.length})</div></div>
    </div>
    <div class="certs">
      <div class="certbox ${e1done?'on':''}">${e1done?'✔':'○'} Certificado · Etapa 1 (Fundamentos)</div>
      <div class="certbox ${finalOk?'on':''}">${finalOk?'✔':'○'} Certificado Final</div>
    </div>
    <h2 class="sec">Etapa 1 · Fundamentos <small style="font-weight:600;color:#90a3b3">— conclusão: ao menos ${meta1} POPs da área</small></h2>
    <table><thead><tr><th>Código</th><th>Procedimento</th><th>Situação</th><th>Acertos</th><th>Tentativas</th></tr></thead>
      <tbody>${popRows(e1pops,1)}</tbody></table>
    <h2 class="sec">Etapa 2 · Avançado ${e2unlocked?'':'(bloqueada — conclua a Etapa 1)'}</h2>
    <table><thead><tr><th>Código</th><th>Procedimento</th><th>Situação</th><th>Acertos</th><th>Tentativas</th></tr></thead>
      <tbody>${popRows(e2pops,2)}</tbody></table>
    <div class="foot">
      <div class="disc">Documento gerado automaticamente pelo sistema de POPs do Hospital Nereu Ramos. Dados referentes à data/hora de emissão.</div>
      <div class="sign"><div class="ln"></div><b>Educação Continuada</b><small>Hospital Nereu Ramos</small></div>
    </div>
  </div>`;
}

    .toolbar .print{background:#fff;color:#0a4da2}.toolbar .close{background:rgba(255,255,255,.18);color:#fff}
    @media print{.toolbar{display:none}body{padding:0}@page{margin:14mm}}
  </style></head><body>
    <div class="toolbar no-print">
      <b>${cols.length===1?'Relatório individual pronto':(cols.length+' relatórios individuais prontos')} — use “Imprimir / Salvar PDF”.</b>
      <button class="print" onclick="window.print()">🖨 Imprimir / Salvar PDF</button>
      <button class="close" onclick="window.close()">Fechar</button>
    </div>
    ${pages}
  </body></html>`;
  const w = window.open('', '_blank');
  if(!w){ alert('Permita pop-ups para gerar o relatório.'); return; }
  w.document.open(); w.document.write(html); w.document.close();
}

/* Relatório individual: gera o relatório completo de cada colaborador marcado
   (isolado, 1 por página). Exige ao menos um selecionado. */
function gerarRelatorioIndividual(){
  const checked = [...document.querySelectorAll('.sel-colab:checked')].map(c=>c.value);
  if(!checked.length){ alert('Marque ao menos um colaborador na lista para gerar o relatório individual.'); return; }
  const cols = [...colaboradoresGestor].sort(byNome).filter(c=>checked.includes(c.matricula));
  abrirRelatorioIndividual(cols);
}
function toggleAllColabs(cb){
  document.querySelectorAll('.sel-colab').forEach(c=>{ c.checked = cb.checked; });
}

/* ---------- main render ---------- */
function render(){
  const right=document.getElementById('topbar-right');
  const tb=document.getElementById('theme-btn');
  const bar=document.querySelector('.topbar');
  if(!session){
    if(right)right.innerHTML='';
    document.documentElement.dataset.theme='dark';   // portal sempre escuro
    if(tb)tb.style.display='none';                    // sem alternar tema no portal
    if(bar)bar.style.display='none';                  // portal "Certidão" ocupa a tela toda
    $('#app').innerHTML=renderAuth();return;
  }
  if(bar)bar.style.display='';
  document.documentElement.dataset.theme = theme==='dark'?'dark':'';
  if(tb){tb.style.display='';tb.textContent = theme==='dark'?'☀️':'🌙';}
  if(right)right.innerHTML=renderTopRight();
  let html='';
  if(session.role==='gestor'){
    if(screen==='busca')html=renderBuscaGestor();
    else if(screen==='reader')html=renderReader();
    else html=renderGestor();
  }
  else{
    if(screen==='list')html=renderColabList();
    else if(screen==='reader')html=renderReader();
    else if(screen==='quiz')html=renderQuiz();
    else if(screen==='result')html=renderResult();
    else if(screen==='cert')html=renderCert();
  }
  $('#app').innerHTML=html;
  if(screen==='busca'||(session.role==='colaborador'&&screen==='list'))wireSearch();
  if(session.role==='colaborador'&&screen==='reader'&&!consulta)wireReadGate();
  if(session.role==='colaborador'&&screen==='quiz')updateTimerUI();
}

document.getElementById('logo-src').src=LOGO_URI;

(async function init(){
  if(!window.POPS_LOCAL_MODE && POPApi.currentProfile){
    // produção: a verdade é a sessão do Supabase (auto-retoma de onde parou)
    let perfil=null; try{ perfil=await POPApi.currentProfile(); }catch{}
    if(perfil && perfil.is_gestor){ session={role:'gestor'}; salvarSessao(); await carregarResultadosGestor(); }
    else if(perfil){ aplicarPerfil(perfil); salvarSessao(); carregarProgressoLocal(); await carregarAprovados(); await garantirSorteio(); }
    else { session=null; salvarSessao(); }
    render(); return;
  }
  // demo (?demo=1) ou sem Supabase: comportamento via localStorage
  if(session && session.role==='colaborador'){ carregarProgressoLocal(); await carregarAprovados(); await garantirSorteio(); }
  else if(session && session.role==='gestor'){ await carregarResultadosGestor(); }
  render();
})();
</script>
